<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{CUSTOMER_NAME}} -- Customer Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS (dark mode default) ── */
:root {
  --bg-primary: #0c0f14;
  --bg-elevated: #141820;
  --bg-surface: #1a1f2b;
  --bg-hover: #222838;
  --border: #2a3040;
  --border-subtle: #1e2430;
  --text-primary: #e8eaed;
  --text-secondary: #8b92a0;
  --text-tertiary: #5c6370;
  --accent: #d4a853;
  --accent-dim: rgba(212, 168, 83, 0.12);
  --accent-border: rgba(212, 168, 83, 0.25);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.10);
  --green-border: rgba(74, 222, 128, 0.22);
  --blue: #60a5fa;
  --blue-dim: rgba(96, 165, 250, 0.10);
  --blue-border: rgba(96, 165, 250, 0.22);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.10);
  --amber-border: rgba(251, 191, 36, 0.22);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.10);
  --red-border: rgba(248, 113, 113, 0.22);
  --orange: #fb923c;
  --orange-dim: rgba(251, 146, 60, 0.10);
  --orange-border: rgba(251, 146, 60, 0.22);
  --gray: #6b7280;
  --gray-dim: rgba(107, 114, 128, 0.10);
  --gray-border: rgba(107, 114, 128, 0.22);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 6px;
  --noise-opacity: 0.025;
  --sidebar-width: 220px;
  --sidebar-collapsed: 56px;

  /* Semantic chart color aliases */
  --color-positive: var(--green);
  --color-warning: var(--amber);
  --color-danger: var(--red);
  --color-info: var(--blue);
  --color-accent: var(--accent);
  --color-muted: var(--text-tertiary);
  --chart-grid: var(--border-subtle);
  --chart-axis-label: var(--text-tertiary);
  --chart-tooltip-bg: var(--bg-elevated);
  --chart-tooltip-border: var(--border);
}

/* ── LIGHT MODE ── */
@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f6f4f0;
    --bg-elevated: #ffffff;
    --bg-surface: #eeece8;
    --bg-hover: #e6e4e0;
    --border: #d4d2ce;
    --border-subtle: #e0ded9;
    --text-primary: #1a1a1a;
    --text-secondary: #5c5c5c;
    --text-tertiary: #8c8c8c;
    --accent: #b8922e;
    --accent-dim: rgba(184, 146, 46, 0.10);
    --accent-border: rgba(184, 146, 46, 0.25);
    --green: #1a7a4c;
    --green-dim: rgba(26, 122, 76, 0.08);
    --green-border: rgba(26, 122, 76, 0.20);
    --blue: #1565a0;
    --blue-dim: rgba(96, 165, 250, 0.08);
    --blue-border: rgba(21, 101, 160, 0.20);
    --amber: #9a6e08;
    --amber-dim: rgba(154, 110, 8, 0.08);
    --amber-border: rgba(154, 110, 8, 0.20);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --red-border: rgba(220, 38, 38, 0.20);
    --orange: #c2410c;
    --orange-dim: rgba(194, 65, 12, 0.08);
    --orange-border: rgba(194, 65, 12, 0.20);
    --gray: #6b6a6a;
    --gray-dim: rgba(107, 106, 106, 0.08);
    --gray-border: rgba(107, 106, 106, 0.20);
    --noise-opacity: 0;
  }
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── BASE ── */
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  height: 100vh;
}

/* ── NOISE TEXTURE (dark mode only via opacity token) ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: var(--noise-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 9999;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ── SHELL LAYOUT ── */
.shell {
  display: grid;
  grid-template-rows: auto 1fr;
  grid-template-columns: var(--sidebar-width) 1fr;
  height: 100vh;
  transition: grid-template-columns 0.25s ease-out;
}

.shell.collapsed {
  grid-template-columns: var(--sidebar-collapsed) 1fr;
}

/* ── HEADER ── */
.dash-header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-elevated);
  gap: 20px;
  min-height: 64px;
}

.dash-header-left {
  display: flex;
  align-items: baseline;
  gap: 16px;
  min-width: 0;
}

.dash-header h1 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -0.3px;
  white-space: nowrap;
}

.dash-header-rule {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

.dash-header-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
}

.dash-header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* audience-toggle removed — audience mode set at generation time via compose.py */

/* ── SIDEBAR ── */
.sidebar {
  grid-row: 2;
  grid-column: 1;
  background: var(--bg-elevated);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease-out;
}

.sidebar-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  margin: 12px 12px 8px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.15s ease-out;
  flex-shrink: 0;
}

.sidebar-toggle:hover {
  background: var(--bg-hover);
  color: var(--text-secondary);
}

.sidebar-toggle svg {
  width: 16px;
  height: 16px;
  transition: transform 0.25s ease-out;
}

.shell.collapsed .sidebar-toggle svg {
  transform: rotate(180deg);
}

.sidebar-nav {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 4px 8px;
  gap: 2px;
  overflow-y: auto;
}

.nav-separator {
  height: 1px;
  background: var(--border-subtle);
  margin: 8px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s ease-out;
  border-left: 3px solid transparent;
  color: var(--text-secondary);
  text-decoration: none;
  position: relative;
  white-space: nowrap;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  border-left-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

.nav-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-icon svg {
  width: 18px;
  height: 18px;
}

.nav-label {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: opacity 0.2s ease-out;
}

.nav-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-surface);
  color: var(--text-tertiary);
  border: 1px solid var(--border-subtle);
  transition: opacity 0.2s ease-out;
  flex-shrink: 0;
}

.nav-item.active .nav-badge {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent-border);
}

/* Collapsed state: hide labels and badges */
.shell.collapsed .nav-label,
.shell.collapsed .nav-badge {
  opacity: 0;
  width: 0;
  overflow: hidden;
}

.shell.collapsed .nav-item {
  justify-content: center;
  padding: 10px 0;
  gap: 0;
}

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border-subtle);
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-footer-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
  white-space: nowrap;
  transition: opacity 0.2s ease-out;
}

.shell.collapsed .sidebar-footer-text {
  opacity: 0;
}

/* ── CONTENT AREA ── */
.content {
  grid-row: 2;
  grid-column: 2;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0;
}

.panel {
  display: none;
  padding: clamp(24px, 3vw, 40px) clamp(24px, 4vw, 48px);
  max-width: 1100px;
  animation: panelFadeIn 0.3s ease-out;
}

.panel.active {
  display: block;
}

@keyframes panelFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── PLACEHOLDER PANELS ── */
.placeholder-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  text-align: center;
  gap: 12px;
}

.placeholder-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.placeholder-icon svg {
  width: 24px;
  height: 24px;
}

.placeholder-title {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--text-primary);
}

.placeholder-desc {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-tertiary);
  max-width: 400px;
  line-height: 1.6;
}

/* ── COMMAND PALETTE ── */
.cmd-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 20vh;
  z-index: 10000;
}

.cmd-overlay.visible {
  display: flex;
}

.cmd-palette {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 520px;
  max-width: 90vw;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
  overflow: hidden;
}

.cmd-input-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
}

.cmd-input-wrap svg {
  width: 18px;
  height: 18px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.cmd-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-primary);
}

.cmd-input::placeholder {
  color: var(--text-tertiary);
}

.cmd-results {
  padding: 8px;
  max-height: 320px;
  overflow-y: auto;
}

.cmd-result {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 14px;
  transition: background 0.1s ease-out;
}

.cmd-result:hover, .cmd-result.selected {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.cmd-result-key {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  background: var(--bg-surface);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border-subtle);
}

.cmd-footer {
  padding: 10px 20px;
  border-top: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  display: flex;
  gap: 16px;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .shell {
    grid-template-columns: var(--sidebar-collapsed) 1fr;
  }
  .nav-label, .nav-badge {
    opacity: 0;
    width: 0;
    overflow: hidden;
  }
  .nav-item {
    justify-content: center;
    padding: 10px 0;
    gap: 0;
  }
  .sidebar-footer-text {
    opacity: 0;
  }
  .sidebar-toggle {
    margin: 12px auto 8px;
  }
}

@media (max-width: 700px) {
  .stats-strip {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  .two-col {
    grid-template-columns: 1fr !important;
  }
  .dash-header {
    padding: 12px 16px;
    flex-wrap: wrap;
  }
  .dash-header-rule {
    display: none;
  }
}

/* ── CONTEXT MENU ── */
.ctx-menu {
  position: fixed;
  z-index: 10000;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 0;
  min-width: 180px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  display: none;
}
.ctx-menu.visible { display: block; }
.ctx-menu-item {
  padding: 8px 16px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctx-menu-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.ctx-menu-separator {
  height: 1px;
  background: var(--border-subtle);
  margin: 4px 8px;
}

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="shell" id="shell">
  <!-- ── HEADER ── -->
  <header class="dash-header">
    <div class="dash-header-left">
      <h1>{{CUSTOMER_NAME}}</h1>
      <div class="dash-header-rule"></div>
      <span class="dash-header-meta">Customer Intelligence Dashboard</span>
      <div class="dash-header-rule"></div>
      <span class="dash-header-meta">{{GENERATED_DATE}}</span>
    </div>
    <div class="dash-header-right">
      <!-- Audience mode set at generation time via compose.py --internal flag -->
    </div>
  </header>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Collapse sidebar" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Nav items built by JS from PanelRegistry -->
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-text">W&B Field Engineering</div>
      <div class="sidebar-footer-text" style="margin-top:4px; font-size:9px; opacity:0.7;">Generated {{GENERATED_DATE}}</div>
    </div>
  </aside>

  <!-- ── CONTENT ── -->
  <main class="content" id="content">
    <!-- Panel containers created dynamically by JS -->
  </main>
</div>

<!-- ── COMMAND PALETTE ── -->
<div class="cmd-overlay" id="cmd-overlay" onclick="if(event.target===this)closeCmdPalette()">
  <div class="cmd-palette">
    <div class="cmd-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input class="cmd-input" id="cmd-input" type="text" placeholder="Jump to panel..." autocomplete="off">
    </div>
    <div class="cmd-results" id="cmd-results">
      <!-- Populated by JS -->
    </div>
    <div class="cmd-footer">
      <span>Enter to select</span>
      <span>Esc to close</span>
      <span>1-6 jump to panel</span>
    </div>
  </div>
</div>

<!-- ── DEPENDENCIES (synchronous, in order) ── -->
<script src="lib/echarts.min.js"></script>
<script src="lib/chart-helpers.js"></script>
<script src="lib/panel-registry.js"></script>
<script src="data.js"></script>
{{PANEL_SCRIPTS}}

<script>

// HELPERS
// ════════════════════════════════════════════════════════════════
function resolveKey(obj, dotPath) {
  if (!obj || !dotPath) return null;
  var parts = dotPath.split('.');
  var current = obj;
  for (var i = 0; i < parts.length; i++) {
    var key = parts[i];
    if (key === 'length' && Array.isArray(current)) {
      return current.length;
    }
    if (current == null || typeof current !== 'object') return null;
    current = current[key];
  }
  return current;
}

function humanizeConcern(raw) {
  var map = {
    'workspace': 'Workspace',
    'crashed_run': 'Crashed Runs',
    'app__runs_table': 'Runs Table',
    'charts': 'Charts',
    'performance': 'Performance',
    'client__authentication': 'Authentication',
    'reports': 'Reports',
    'admin__service_accounts': 'Service Accounts',
    'connectivity': 'Connectivity',
    'resuming': 'Resuming',
    'app__other': 'App (Other)',
    'app__login': 'Login',
    'client__public_api': 'Public API',
    'cloud_services': 'Cloud Services'
  };
  return map[raw] || raw.replace(/__/g, ' / ').replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

// ════════════════════════════════════════════════════════════════
// SIDEBAR & NAVIGATION
// ════════════════════════════════════════════════════════════════
var currentPanel = null;
var renderedPanels = {};

function buildSidebar() {
  var nav = document.getElementById('sidebar-nav');
  var panels = PanelRegistry.getAll();
  var lastGroup = null;
  var panelIndex = 0;

  panels.forEach(function(panel) {
    // Check data availability: skip if no data and not always_show
    // Panels declare dataKey — resolve it against INTELLIGENCE_DATA
    if (panel.dataKey && !resolveKey(INTELLIGENCE_DATA, panel.dataKey)) {
      return; // no data, hide panel
    }

    panelIndex++;

    // Add separator between groups
    if (lastGroup && lastGroup !== panel.group) {
      var sep = document.createElement('div');
      sep.className = 'nav-separator';
      nav.appendChild(sep);
    }
    lastGroup = panel.group;

    // Resolve badge value
    var badgeValue = panel.badgeKey ? resolveKey(INTELLIGENCE_DATA, panel.badgeKey) : null;

    // Build nav item
    var el = document.createElement('a');
    el.className = 'nav-item';
    el.href = '#' + panel.id;
    el.dataset.panel = panel.id;
    el.dataset.index = panelIndex;

    var ariaText = panel.label;
    if (badgeValue) ariaText += ' (' + badgeValue + ')';
    el.setAttribute('aria-label', ariaText);
    el.setAttribute('title', panel.label);

    // panel.icon is either an ICON_MAP key (from panels.yaml) or inline SVG (from JS registration)
    var iconSvg = (panel.icon && panel.icon.indexOf('<svg') !== -1) ? panel.icon : (ICON_MAP[panel.icon] || ICON_MAP['grid']);
    el.innerHTML =
      '<span class="nav-icon">' + iconSvg + '</span>' +
      '<span class="nav-label">' + panel.label + '</span>' +
      (badgeValue ? '<span class="nav-badge">' + badgeValue + '</span>' : '');

    el.addEventListener('click', function(e) {
      e.preventDefault();
      navigateTo(panel.id);
    });

    nav.appendChild(el);

    // Create panel container in content area
    var content = document.getElementById('content');
    var section = document.createElement('section');
    section.className = 'panel';
    section.id = 'panel-' + panel.id;
    content.appendChild(section);
  });
}

function navigateTo(panelId) {
  // Update hash without scroll
  history.replaceState(null, '', '#' + panelId);

  // Deactivate all nav items
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  // Activate new
  var navEl = document.querySelector('.nav-item[data-panel="' + panelId + '"]');
  if (navEl) navEl.classList.add('active');

  // Hide all panels
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  // Show target
  var panel = document.getElementById('panel-' + panelId);
  if (panel) {
    panel.classList.add('active');

    // Render on first visit via PanelRegistry
    if (!renderedPanels[panelId]) {
      renderedPanels[panelId] = true;
      var config = { audience: (INTELLIGENCE_DATA.config && INTELLIGENCE_DATA.config.audience) || 'internal' };
      PanelRegistry.renderPanel(panelId, panel, INTELLIGENCE_DATA, config);
    }

    // Resize charts after panel becomes visible
    setTimeout(function() {
      ChartHelpers.resizeAll();
    }, 50);
  }

  currentPanel = panelId;
}

function toggleSidebar() {
  var shell = document.getElementById('shell');
  shell.classList.toggle('collapsed');
  var btn = document.querySelector('.sidebar-toggle');
  if (shell.classList.contains('collapsed')) {
    btn.setAttribute('aria-label', 'Expand sidebar');
  } else {
    btn.setAttribute('aria-label', 'Collapse sidebar');
  }
  setTimeout(function() {
    ChartHelpers.resizeAll();
  }, 300);
}

// ════════════════════════════════════════════════════════════════
// AMBIENT TAB TITLE
// ════════════════════════════════════════════════════════════════
function updateTabTitle() {
  var customer = INTELLIGENCE_DATA.customer || 'Dashboard';
  var staleCount = 0;
  PanelRegistry.getAll().forEach(function(panel) {
    if (panel.id === 'overview') return;
    try {
      var panelData = panel.dataKey ? resolveKey(INTELLIGENCE_DATA, panel.dataKey) : null;
      if (panelData) {
        var items = panel.getAttentionItems(panelData);
        staleCount += items.filter(function(i) { return i.severity === 'high'; }).length;
      }
    } catch(e) {}
  });
  document.title = staleCount > 0
    ? customer + ' (' + staleCount + ' urgent) -- Dashboard'
    : customer + ' -- Dashboard';
}

// ════════════════════════════════════════════════════════════════
// AUDIENCE MODE (set at generation time via compose.py --internal)
// ════════════════════════════════════════════════════════════════
function applyAudienceMode() {
  var mode = (INTELLIGENCE_DATA.config && INTELLIGENCE_DATA.config.audience) || 'internal';
  if (mode === 'external') {
    document.body.classList.add('external-mode');
  } else {
    document.body.classList.remove('external-mode');
  }
}

// ════════════════════════════════════════════════════════════════
// COMMAND PALETTE
// ════════════════════════════════════════════════════════════════
var cmdOpen = false;
var cmdSelected = 0;

function getVisiblePanels() {
  return PanelRegistry.getAll().filter(function(p) {
    if (!p.dataKey) return true; // always_show panels have no dataKey
    return !!resolveKey(INTELLIGENCE_DATA, p.dataKey);
  });
}

function openCmdPalette() {
  var overlay = document.getElementById('cmd-overlay');
  var input = document.getElementById('cmd-input');
  overlay.classList.add('visible');
  input.value = '';
  input.focus();
  cmdOpen = true;
  cmdSelected = 0;
  renderCmdResults('');
}

function closeCmdPalette() {
  document.getElementById('cmd-overlay').classList.remove('visible');
  cmdOpen = false;
}

function renderCmdResults(query) {
  var container = document.getElementById('cmd-results');
  var q = query.toLowerCase();
  var panels = getVisiblePanels();
  var filtered = panels.filter(function(item) {
    return item.label.toLowerCase().indexOf(q) !== -1 || item.id.toLowerCase().indexOf(q) !== -1;
  });

  if (cmdSelected >= filtered.length) cmdSelected = Math.max(0, filtered.length - 1);

  container.innerHTML = filtered.map(function(item, i) {
    var iconSvg = (item.icon && item.icon.indexOf('<svg') !== -1) ? item.icon : (ICON_MAP[item.icon] || ICON_MAP['grid']);
    var idx = panels.indexOf(item) + 1;
    return '<div class="cmd-result' + (i === cmdSelected ? ' selected' : '') + '" data-panel="' + item.id + '" onclick="navigateTo(\'' + item.id + '\');closeCmdPalette()">' +
      '<span class="nav-icon" style="width:18px;height:18px;">' + iconSvg + '</span>' +
      '<span>' + item.label + '</span>' +
      '<span class="cmd-result-key">' + idx + '</span>' +
      '</div>';
  }).join('');
}

// ════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  // Command palette toggle
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    if (cmdOpen) closeCmdPalette();
    else openCmdPalette();
    return;
  }

  if (cmdOpen) {
    var input = document.getElementById('cmd-input');
    if (e.key === 'Escape') {
      closeCmdPalette();
      return;
    }
    if (e.key === 'Enter') {
      var results = document.querySelectorAll('.cmd-result');
      if (results[cmdSelected]) {
        navigateTo(results[cmdSelected].dataset.panel);
        closeCmdPalette();
      }
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      var results = document.querySelectorAll('.cmd-result');
      cmdSelected = Math.min(cmdSelected + 1, results.length - 1);
      renderCmdResults(input.value);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      cmdSelected = Math.max(cmdSelected - 1, 0);
      renderCmdResults(document.getElementById('cmd-input').value);
      return;
    }
    // Let typing flow to input, then re-render
    setTimeout(function() {
      cmdSelected = 0;
      renderCmdResults(input.value);
    }, 0);
    return;
  }

  // Number keys for panel jump (only when no input focused)
  if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
  var num = parseInt(e.key);
  if (num >= 1 && num <= 6) {
    var panels = getVisiblePanels();
    if (panels[num - 1]) {
      navigateTo(panels[num - 1].id);
    }
  }
});

// ════════════════════════════════════════════════════════════════
// HASH CHANGE LISTENER
// ════════════════════════════════════════════════════════════════
window.addEventListener('hashchange', function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && hash !== currentPanel) {
    navigateTo(hash);
  }
});

// ════════════════════════════════════════════════════════════════
// RESIZE LISTENER
// ════════════════════════════════════════════════════════════════
window.addEventListener('resize', function() {
  ChartHelpers.resizeAll();
});

// ════════════════════════════════════════════════════════════════
// CONTEXTUAL RIGHT-CLICK MENU
// ════════════════════════════════════════════════════════════════
var ctxMenu = document.createElement('div');
ctxMenu.className = 'ctx-menu';
ctxMenu.id = 'ctx-menu';
document.body.appendChild(ctxMenu);

document.addEventListener('click', function() { ctxMenu.classList.remove('visible'); });
document.addEventListener('contextmenu', function(e) {
  var jiraLink = e.target.closest('[data-jira-key]');
  var submitterEl = e.target.closest('[data-submitter]');

  if (jiraLink) {
    e.preventDefault();
    var key = jiraLink.dataset.jiraKey;
    showContextMenu(e.clientX, e.clientY, [
      { label: 'Open in Jira', action: function() { window.open('https://wandb.atlassian.net/browse/' + key, '_blank'); } },
      { label: 'Copy issue key', action: function() { navigator.clipboard.writeText(key); } },
      { separator: true },
      { label: 'Search in Slack', action: function() { window.open('https://coreweave.slack.com/search/' + encodeURIComponent(key), '_blank'); } }
    ]);
  } else if (submitterEl) {
    e.preventDefault();
    var name = submitterEl.dataset.submitter;
    showContextMenu(e.clientX, e.clientY, [
      { label: 'Search in Slack', action: function() { window.open('https://coreweave.slack.com/search/' + encodeURIComponent(name), '_blank'); } },
      { label: 'Copy name', action: function() { navigator.clipboard.writeText(name); } }
    ]);
  }
});

function showContextMenu(x, y, items) {
  ctxMenu.innerHTML = items.map(function(item) {
    return item.separator ? '<div class="ctx-menu-separator"></div>' :
      '<div class="ctx-menu-item">' + item.label + '</div>';
  }).join('');
  var actionItems = items.filter(function(it) { return !it.separator; });
  ctxMenu.querySelectorAll('.ctx-menu-item').forEach(function(el, i) {
    if (actionItems[i]) el.addEventListener('click', actionItems[i].action);
  });
  ctxMenu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  ctxMenu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
  ctxMenu.classList.add('visible');
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  buildSidebar();
  updateTabTitle();

  // Navigate to hash or default to overview
  var hash = window.location.hash.replace('#', '');
  var panels = getVisiblePanels();
  var validIds = panels.map(function(p) { return p.id; });

  if (hash && validIds.indexOf(hash) !== -1) {
    navigateTo(hash);
  } else if (validIds.length > 0) {
    navigateTo(validIds[0]);
  }

  // Apply audience mode from generation-time config
  applyAudienceMode();
});
</script>
