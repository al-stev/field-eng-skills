// ── BUCKET FILTER ──
function filterByBucket(bucket) {
  // Clear existing callout filter
  calloutFilter = null;
  document.getElementById('clearCalloutFilter').style.display = 'none';

  // Set status filter based on bucket
  if (bucket === 'triage') {
    activeFilters.statuses = new Set(['Triage']);
  } else if (bucket === 'resolved') {
    activeFilters.statuses = new Set([...RESOLVED_STATUSES]);
  } else if (bucket === 'active' || bucket === 'stale') {
    // These need callout filter since they depend on comment data
    activeFilters.statuses = new Set();
    calloutFilter = i => classifyIssue(i) === bucket;
    document.getElementById('clearCalloutFilter').style.display = '';
  }

  // Update status pills UI
  document.querySelectorAll('#statusFilters .pill').forEach(p => {
    p.classList.remove('active');
    if (activeFilters.statuses.size === 0 && p.dataset.value === '__all__') {
      p.classList.add('active');
    } else if (activeFilters.statuses.has(p.dataset.value)) {
      p.classList.add('active');
    }
  });

  render();
  document.querySelector('.issue-list-section').scrollIntoView({ behavior: 'smooth' });
}

// ── USAGE HELPERS ──
function classifyZone(percent) {
  if (percent >= 80) return 'healthy';
  if (percent >= 50) return 'at_risk';
  return 'critical';
}
function zoneClass(percent) {
  const z = classifyZone(percent);
  return z === 'healthy' ? 'zone-green' : z === 'at_risk' ? 'zone-amber' : 'zone-red';
}
function zoneColor(percent) {
  const z = classifyZone(percent);
  if (z === 'healthy') return isDark ? '#4ade80' : '#1a7a4c';
  if (z === 'at_risk') return isDark ? '#fbbf24' : '#9a6e08';
  return isDark ? '#f87171' : '#dc2626';
}
function formatTrendHTML(change) {
  if (change == null) return '';
  const arrow = change > 0 ? '\u2191' : change < 0 ? '\u2193' : '\u2014';
  const cls = change > 0 ? 'trend-up' : change < 0 ? 'trend-down' : 'trend-stable';
  return `<span class="${cls}" style="font-family:var(--font-body);font-size:14px;font-weight:400;margin-left:8px">${arrow} ${Math.abs(change).toFixed(1)}% vs prior period</span>`;
}
function formatNumber(n) {
  return n != null ? n.toLocaleString() : '\u2014';
}

  const maxUsers = Math.max(...areas.map(a => a.unique_users));
  const blueColor = isDark ? '#60a5fa' : '#1565a0';

    tooltip: {
      trigger: 'item',

        const data = params.data;

        areas.forEach((a, i) => {

// ── USAGE PANEL (main orchestrator) ──
function renderUsagePanel() {
  const usage = INTELLIGENCE_DATA.usage;
  const emptyEl = document.getElementById('usageEmpty');
  const contentEl = document.getElementById('usageContent');
  const kpiEl = document.getElementById('usagePanelKPIs');

  if (!usage || !usage.available) {
    const reason = usage ? usage.reason : 'not_configured';
    const messages = {
      'not_configured': 'Not configured \u2014 add sfdc_account_id to templates/customers.yaml',
      'no_data': 'No usage data available for this customer',
      'api_error': 'BigQuery data unavailable \u2014 check ADC credentials with /bigquery-setup'
    };
    if (emptyEl) {
      emptyEl.style.display = '';
      emptyEl.querySelector('.empty-state').textContent = messages[reason] || messages['no_data'];
    }
    return;
  }

  // Show content, hide empty state
  if (contentEl) contentEl.style.display = '';

  // Render KPIs inside the usage panel
  if (kpiEl) {
    const t = usage.trends || {};
    let kpiHtml = '';
    if (usage.seat_utilization) {
      kpiHtml += `<div class="usage-kpi-item"><span class="usage-kpi-value">${usage.seat_utilization.active} / ${usage.seat_utilization.contracted} seats (<span class="${zoneClass(usage.seat_utilization.utilization_percent)}">${Math.round(usage.seat_utilization.utilization_percent)}%</span>)</span>${formatTrendHTML(t.seat_utilization_change)}</div>`;
    }
    if (usage.weave) {
      kpiHtml += `<div class="usage-kpi-item"><span class="usage-kpi-value">${usage.weave.ingestion_gb.toFixed(0)} GB / ${usage.weave.limit_gb.toFixed(0)} GB (<span class="${zoneClass(usage.weave.utilization_percent)}">${Math.round(usage.weave.utilization_percent)}%</span>)</span>${formatTrendHTML(t.weave_ingestion_change)}</div>`;
    }
    if (usage.tracked_hours) {
      kpiHtml += `<div class="usage-kpi-item"><span class="usage-kpi-value">${formatNumber(Math.round(usage.tracked_hours.last_30d_hours))}h compute last 30d</span>${formatTrendHTML(t.tracked_hours_change)}</div>`;
    }
    kpiEl.innerHTML = kpiHtml;
  }

  // Render ECharts charts
  renderSeatChart(usage);
  renderRadarChart(usage);
  renderWeaveChart(usage);
  renderHoursChart(usage);

  // Render account health grid (DOM-based, internal-only)
  if (usage.account_health) {
    renderAccountHealthGrid(usage.account_health);
  }
}
