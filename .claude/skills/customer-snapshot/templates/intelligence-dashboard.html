<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
/* ── DESIGN TOKENS (dark mode default) ── */
:root {
  --bg-primary: #0c0f14;
  --bg-elevated: #141820;
  --bg-surface: #1a1f2b;
  --bg-hover: #222838;
  --border: #2a3040;
  --border-subtle: #1e2430;
  --text-primary: #e8eaed;
  --text-secondary: #8b92a0;
  --text-tertiary: #5c6370;
  --accent: #d4a853;
  --accent-dim: rgba(212, 168, 83, 0.12);
  --accent-border: rgba(212, 168, 83, 0.25);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.10);
  --green-border: rgba(74, 222, 128, 0.22);
  --blue: #60a5fa;
  --blue-dim: rgba(96, 165, 250, 0.10);
  --blue-border: rgba(96, 165, 250, 0.22);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.10);
  --amber-border: rgba(251, 191, 36, 0.22);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.10);
  --red-border: rgba(248, 113, 113, 0.22);
  --orange: #fb923c;
  --orange-dim: rgba(251, 146, 60, 0.10);
  --orange-border: rgba(251, 146, 60, 0.22);
  --gray: #6b7280;
  --gray-dim: rgba(107, 114, 128, 0.10);
  --gray-border: rgba(107, 114, 128, 0.22);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 6px;
  --noise-opacity: 0.025;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f6f4f0;
    --bg-elevated: #ffffff;
    --bg-surface: #eeece8;
    --bg-hover: #e6e4e0;
    --border: #d4d2ce;
    --border-subtle: #e0ded9;
    --text-primary: #1a1a1a;
    --text-secondary: #5c5c5c;
    --text-tertiary: #8c8c8c;
    --accent: #b8922e;
    --accent-dim: rgba(184, 146, 46, 0.10);
    --accent-border: rgba(184, 146, 46, 0.25);
    --green: #1a7a4c;
    --green-dim: rgba(26, 122, 76, 0.08);
    --green-border: rgba(26, 122, 76, 0.20);
    --blue: #1565a0;
    --blue-dim: rgba(96, 165, 250, 0.08);
    --blue-border: rgba(21, 101, 160, 0.20);
    --amber: #9a6e08;
    --amber-dim: rgba(154, 110, 8, 0.08);
    --amber-border: rgba(154, 110, 8, 0.20);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --red-border: rgba(220, 38, 38, 0.20);
    --orange: #c2410c;
    --orange-dim: rgba(194, 65, 12, 0.08);
    --orange-border: rgba(194, 65, 12, 0.20);
    --gray: #6b6a6a;
    --gray-dim: rgba(107, 106, 106, 0.08);
    --gray-border: rgba(107, 106, 106, 0.20);
    --noise-opacity: 0;
  }
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── BASE ── */
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── NOISE TEXTURE (dark mode only via opacity token) ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: var(--noise-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 9999;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ── LAYOUT ── */
.container {
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 clamp(16px, 3vw, 32px);
}

/* ── HEADER ── */
.header {
  padding: clamp(32px, 5vw, 56px) 0 clamp(20px, 3vw, 32px);
}

.header-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
}

.header h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}

.header-rule {
  width: 64px;
  height: 2px;
  background: var(--accent);
  margin: 12px 0 20px;
}

.header-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 16px;
}

/* ── HEALTH BUCKETS ── */
.health-buckets {
  display: flex;
  gap: clamp(24px, 4vw, 48px);
  flex-wrap: wrap;
}

.health-bucket {
  cursor: pointer;
  transition: opacity 0.15s ease-out;
}

.health-bucket:hover { opacity: 0.8; }

.health-bucket .bucket-value {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: clamp(24px, 3vw, 32px);
  line-height: 1.1;
}

.health-bucket .bucket-label {
  font-family: var(--font-mono);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.health-bucket .bucket-bar {
  height: 3px;
  border-radius: 2px;
  margin-top: 6px;
  transition: width 0.4s ease-out;
}

/* ── ANALYSIS SECTION ── */
.analysis {
  padding: clamp(24px, 3vw, 40px) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.analysis-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  margin-bottom: 16px;
}

/* ── ATTENTION CALLOUTS ── */
.attention-callouts {
  display: flex;
  flex-direction: column;
  gap: 1px;
  margin-bottom: clamp(24px, 3vw, 36px);
}

.callout {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-elevated);
  cursor: pointer;
  transition: background 0.15s ease-out;
  border-left: 3px solid transparent;
}

.callout:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.callout:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.callout:only-child { border-radius: var(--radius); }

.callout:hover {
  background: var(--bg-hover);
}

.callout.severity-high { border-left-color: var(--red); }
.callout.severity-medium { border-left-color: var(--orange); }
.callout.severity-low { border-left-color: var(--amber); }
.callout.severity-info { border-left-color: var(--blue); }

.callout-count {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  flex-shrink: 0;
  min-width: 28px;
}

.callout.severity-high .callout-count { color: var(--red); }
.callout.severity-medium .callout-count { color: var(--orange); }
.callout.severity-low .callout-count { color: var(--amber); }
.callout.severity-info .callout-count { color: var(--blue); }

.callout-text {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-secondary);
}

.callout-action {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  opacity: 0;
  transition: opacity 0.15s ease-out;
  flex-shrink: 0;
  white-space: nowrap;
}

.callout:hover .callout-action { opacity: 1; color: var(--accent); }

/* ── ANALYSIS GRID (velocity + cadence side by side) ── */
.analysis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(24px, 3vw, 40px);
}

@media (max-width: 720px) {
  .analysis-grid { grid-template-columns: 1fr; }
}

.analysis-box .chart-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}

/* ── VELOCITY CHART (grouped bars per month) ── */
.velocity-chart { display: flex; flex-direction: column; gap: 6px; }

.velocity-row {
  display: grid;
  grid-template-columns: 64px 1fr;
  align-items: center;
  gap: 10px;
  min-height: 28px;
}

.velocity-month {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
}

.velocity-bars {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.velocity-bar {
  height: 10px;
  border-radius: 2px;
  transition: width 0.4s ease-out;
  min-width: 0;
}

.velocity-bar.opened { background: var(--red); opacity: 0.75; }
.velocity-bar.resolved { background: var(--green); opacity: 0.75; }

.velocity-legend {
  display: flex;
  gap: 16px;
  margin-top: 8px;
}

/* ── CADENCE METRICS ── */
.cadence-metrics {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.cadence-metric {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.cadence-value {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 28px;
  line-height: 1.1;
}

.cadence-label {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-secondary);
}

.cadence-context {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
}

/* ── SHARED LEGEND ── */
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-secondary);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── ISSUE LIST SECTION ── */
.issue-list-section {
  padding-top: clamp(16px, 3vw, 28px);
}

/* ── THEME BAR CHART ── */
.charts-section {
  padding: clamp(16px, 3vw, 24px) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.bar-chart { display: flex; flex-direction: column; gap: 6px; }

.bar-row {
  display: grid;
  grid-template-columns: 140px 1fr 40px;
  align-items: center;
  gap: 10px;
  min-height: 24px;
}

.bar-row-label {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bar-track {
  height: 18px;
  background: var(--bg-surface);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  position: relative;
}

.bar-segment {
  height: 100%;
  transition: width 0.4s ease-out;
  min-width: 0;
}

.bar-row-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  text-align: right;
}

.stacked-bar-legend {
  display: flex;
  gap: 16px;
  margin-top: 8px;
  flex-wrap: wrap;
}

/* Bar grow animation */
@keyframes barGrow {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

.bar-segment.animate {
  animation: barGrow 0.5s ease-out both;
  transform-origin: left;
}

/* ── FILTER BAR ── */
.filters {
  padding: clamp(12px, 2vw, 18px) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.filter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-group-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  margin-right: 2px;
}

.filter-sep {
  width: 1px;
  height: 22px;
  background: var(--border);
  flex-shrink: 0;
}

.pill {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s ease-out;
  white-space: nowrap;
}

.pill:hover {
  border-color: var(--text-tertiary);
  color: var(--text-primary);
}

.pill.active {
  background: var(--accent-dim);
  border-color: var(--accent-border);
  color: var(--accent);
}

.filter-select {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238b92a0' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 28px;
}

.filter-search {
  font-family: var(--font-body);
  font-size: 13px;
  padding: 5px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-primary);
  min-width: 180px;
  outline: none;
  transition: border-color 0.15s ease-out;
}

.filter-search::placeholder { color: var(--text-tertiary); }
.filter-search:focus { border-color: var(--accent-border); }

/* Active filter indicator */
.filter-active-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius);
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  transition: opacity 0.15s ease-out;
}

.filter-active-label:hover { opacity: 0.8; }

/* ── THEME SECTIONS ── */
.themes { padding-top: 8px; }

.theme-section {
  border-bottom: 1px solid var(--border-subtle);
}

.theme-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: clamp(12px, 2vw, 16px) 0;
  cursor: pointer;
  transition: background 0.15s ease-out;
  margin: 0 calc(-1 * clamp(16px, 3vw, 32px));
  padding-left: clamp(16px, 3vw, 32px);
  padding-right: clamp(16px, 3vw, 32px);
}

.theme-header:hover {
  background: var(--bg-hover);
}

.theme-arrow {
  font-size: 12px;
  color: var(--text-tertiary);
  transition: transform 0.2s ease-out, color 0.15s ease-out;
  flex-shrink: 0;
}

.theme-header:hover .theme-arrow {
  color: var(--accent);
}

.theme-section.collapsed .theme-arrow {
  transform: rotate(-90deg);
}

.theme-name {
  font-family: var(--font-display);
  font-size: clamp(16px, 2vw, 20px);
  font-weight: 400;
  flex: 1;
  user-select: none;
}

.theme-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

.theme-badges {
  display: flex;
  gap: 4px;
}

.mini-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.5px;
}

.mini-badge.p0 { background: var(--red-dim); color: var(--red); }
.mini-badge.p1 { background: var(--orange-dim); color: var(--orange); }
.mini-badge.p2 { background: var(--amber-dim); color: var(--amber); }
.mini-badge.p3 { background: var(--gray-dim); color: var(--gray); }

.theme-body {
  display: grid;
  grid-template-rows: 1fr;
  transition: grid-template-rows 0.25s ease-out;
}

.theme-section.collapsed .theme-body {
  grid-template-rows: 0fr;
}

.theme-body-inner {
  overflow: hidden;
}

/* ── ISSUE TABLE ── */
.issue-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8px;
}

.issue-table th {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.issue-table td {
  font-size: 13px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}

.issue-table tr:last-child td { border-bottom: none; }
.issue-table tr:hover td { background: var(--bg-hover); }

.issue-key {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  text-decoration: none;
}

.issue-key:hover { text-decoration: underline; }

.issue-summary {
  color: var(--text-primary);
  max-width: 360px;
}

.type-badge, .status-badge, .priority-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
  display: inline-block;
}

.type-badge.bug { background: var(--red-dim); color: var(--red); }
.type-badge.feature { background: var(--blue-dim); color: var(--blue); }

.priority-badge.p0 { background: var(--red-dim); color: var(--red); }
.priority-badge.p1 { background: var(--orange-dim); color: var(--orange); }
.priority-badge.p2 { background: var(--amber-dim); color: var(--amber); }
.priority-badge.p3 { background: var(--gray-dim); color: var(--gray); }

.assignee { font-size: 12px; color: var(--text-secondary); }
.assignee.unassigned { color: var(--text-tertiary); font-style: italic; }

/* Last activity column */
.activity-cell {
  font-family: var(--font-mono);
  font-size: 11px;
  white-space: nowrap;
}

.activity-cell.stale { color: var(--red); }
.activity-cell.aging { color: var(--orange); }
.activity-cell.recent { color: var(--green); }
.activity-cell.never { color: var(--text-tertiary); font-style: italic; }

.fe-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--accent-dim);
  color: var(--accent);
  margin-left: 6px;
  white-space: nowrap;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-tertiary);
  font-size: 14px;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in { animation: fadeUp 0.4s ease-out both; }

@media (prefers-reduced-motion: reduce) {
  .animate-in { animation: none; }
  .theme-body { transition: none; }
  .theme-arrow { transition: none; }
  .bar-segment { transition: none; }
  .bar-segment.animate { animation: none; }
  .velocity-bar { transition: none; }
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .issue-table th:nth-child(6),
  .issue-table td:nth-child(6) { display: none; }
  .issue-table th:nth-child(7),
  .issue-table td:nth-child(7) { display: none; }
  .issue-summary { max-width: 200px; }
  .bar-row { grid-template-columns: 100px 1fr 32px; }
}

/* ── SE ACTIONS PANEL ── */
.actions-section {
  padding: clamp(24px, 3vw, 40px) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.actions-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.actions-title {
  font-family: var(--font-display);
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 400;
}

.actions-count-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 100px;
  background: var(--accent-dim);

}

}

.sentiment-score-display.positive { color: var(--green); }

.sentiment-score-display.cautiously-negative { color: var(--amber); }

}

}

.sentiment-channels {

.hot-thread:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.hot-thread:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.hot-thread:only-child { border-radius: var(--radius); }
.hot-thread:hover { background: var(--bg-hover); }

.hot-thread-channel {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 6px;

}

.hot-thread-summary {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-primary);
  flex: 1;
  line-height: 1.4;
}

.hot-thread-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.hot-thread-stat {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  white-space: nowrap;
}

.hot-thread-sentiment {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;

  white-space: nowrap;
}

.hot-thread-sentiment.negative { background: var(--red-dim); color: var(--red); }
.hot-thread-sentiment.critical { background: var(--red-dim); color: var(--red); }
.hot-thread-sentiment.cautiously-negative { background: var(--amber-dim); color: var(--amber); }
.hot-thread-sentiment.neutral { background: var(--gray-dim); color: var(--gray); }
.hot-thread-sentiment.positive { background: var(--green-dim); color: var(--green); }

.hot-thread-link {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  text-decoration: none;
  white-space: nowrap;
}

.hot-thread-link:hover { text-decoration: underline; }

.sentiment-internal {
  margin-top: 20px;
  padding: 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
}

.sentiment-internal-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}

.sentiment-internal-text {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
}

.sentiment-risk-list,
.sentiment-action-list {
  list-style: none;
  padding: 0;
  margin: 0 0 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sentiment-risk-list:last-child,
.sentiment-action-list:last-child { margin-bottom: 0; }

.sentiment-risk-list li,
.sentiment-action-list li {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-secondary);
  padding-left: 16px;
  position: relative;
  line-height: 1.4;
}

.sentiment-risk-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 7px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--red);
}

.sentiment-action-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 7px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

.sentiment-unavailable {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-tertiary);
  padding: 24px 0;
}

/* ── AUDIENCE TOGGLE ── */
.audience-toggle {
  display: flex;
  gap: 4px;
  margin-left: auto;
}

.audience-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.audience-badge.internal {
  background: var(--accent-dim);
  color: var(--accent);
}

.audience-badge.external {
  background: var(--green-dim);
  color: var(--green);
}

/* External mode: active pill gets green instead of gold */
.external-mode .audience-toggle .pill.active {
  background: var(--green-dim);
  border-color: var(--green-border);
  color: var(--green);
}

/* Core show/hide rule */
.external-mode .internal-only {
  display: none !important;
}

/* ── TRENDING SECTION ── */
.trending-section {
  padding: clamp(24px, 3vw, 40px) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.trending-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(20px, 3vw, 36px);
  margin-top: 16px;
}

@media (max-width: 720px) {
  .trending-grid { grid-template-columns: 1fr; }
}

.trending-subsection {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
}

.trending-metric-large {
  font-family: var(--font-mono);
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 600;
  line-height: 1.2;
}

.trending-metric-secondary {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-tertiary);
}

.trending-metric-period {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.trend-indicator {
  display: inline-block;
  margin-left: 6px;
  font-size: 14px;
}

.trend-indicator.growing { color: var(--amber); }
.trend-indicator.shrinking { color: var(--green); }
.trend-indicator.stable { color: var(--text-tertiary); }

.trending-bar-chart {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.trending-bar-row {
  display: grid;
  grid-template-columns: 64px 1fr;
  align-items: center;
  gap: 10px;
  min-height: 28px;
}

.trending-bar-month {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
}

.trending-bar-pair {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.trending-bar {
  height: 10px;
  border-radius: 2px;
  transition: width 0.4s ease-out;
  min-width: 0;
}

.trending-bar.opened { background: var(--amber); opacity: 0.75; }
.trending-bar.closed { background: var(--green); opacity: 0.75; }

.trending-legend {
  display: flex;
  gap: 16px;
  margin-top: 8px;
}

.theme-recurrence-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.theme-recurrence-row {
  display: grid;
  grid-template-columns: 140px 1fr 40px;
  align-items: center;
  gap: 10px;
  min-height: 24px;
}

.theme-recurrence-label {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.theme-recurrence-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  text-align: right;
}

/* ── EXECUTIVE SUMMARY ── */
.exec-summary-section {
  margin-bottom: clamp(20px, 3vw, 32px);
}

.exec-summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(12px, 2vw, 20px);
  margin-top: 16px;
}

@media (max-width: 640px) {
  .exec-summary-grid {
    grid-template-columns: 1fr;
  }
}

.exec-subsection {
  padding: clamp(12px, 2vw, 16px);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
}

.exec-subsection .section-label {
  margin-bottom: 8px;
}

.exec-metric-inline {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 6px;
}

.exec-metric-value {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
}

.exec-metric-label {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-secondary);
}

.exec-hot-item {

  align-items: baseline;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
}

.exec-hot-item:last-child { border-bottom: none; }

.exec-hot-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}

.exec-hot-badge.stale_ticket { background: var(--red-dim); color: var(--red); }
.exec-hot-badge.negative_thread { background: var(--amber-dim); color: var(--amber); }
.exec-hot-badge.escalation { background: var(--orange-dim); color: var(--orange); }

.exec-hot-title {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-primary);
  flex: 1;
  line-height: 1.4;
}

.exec-hot-detail {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  white-space: nowrap;
  flex-shrink: 0;
}

.exec-hot-link {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  text-decoration: none;
  flex-shrink: 0;
}

.exec-hot-link:hover { text-decoration: underline; }

.exec-hot-internal {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-tertiary);
  padding-left: 10px;
  margin-top: 2px;
  font-style: italic;
}

.exec-engagement-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-top: 6px;
}

.exec-engagement-value {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  min-width: 80px;
}

.exec-engagement-label {
  font-family: var(--font-body);

/* ── USAGE PANEL (ECharts) ── */
.usage-section { padding: clamp(24px, 3vw, 40px) 0; border-bottom: 1px solid var(--border-subtle); }

  font-weight: 400; color: var(--text-tertiary); margin-top: 8px;
}
.zone-green { color: var(--green); }
.zone-amber { color: var(--amber); }
.zone-red { color: var(--red); }

.trend-down { color: var(--red); }

  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;
}
@media (max-width: 640px) { .health-grid { grid-template-columns: 1fr; } }
.health-field-label {
  font-family: var(--font-mono);

  text-transform: uppercase; letter-spacing: 1.5px;

}

  font-family: var(--font-body); font-size: 14px; font-weight: 600;

}
.health-dot {
  display: inline-block; width: 8px; height: 8px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
}
.kpi-item { white-space: nowrap; }
.usage-kpis { margin-top: 12px; }

<div class="container">

  <!-- HEADER -->
  <!-- Note: External mode hides internal content visually. Do not share raw HTML file with customers. -->
  <header class="header animate-in">
    <div class="header-subtitle">W&B Jira &middot; Customer Tracker</div>
    <h1 id="title"></h1>
    <div class="header-rule"></div>

        <button class="pill" data-audience="external">External</button>
      </div>

  </section>

  </section>

  <!-- Usage Panel (ECharts) -->
  <section class="usage-section animate-in" style="animation-delay: 57ms" id="usagePanel">
    <div class="usage-header">
      <span class="chart-label">USAGE</span>
    </div>
    <div id="usageEmpty" style="display:none;">
      <p class="empty-state"></p>
    </div>
    <div id="usageContent" style="display:none;">
      <!-- KPI summary row -->
      <div id="usagePanelKPIs" class="usage-kpi-row"></div>

        <span class="chart-label">SEAT UTILIZATION</span>
        <div id="seatChart" style="width:100%;height:280px;"></div>
      </div>

      <div class="usage-chart-section" id="radarSection" style="display:none;">

      </div>

        <div id="weaveChart" style="width:100%;height:240px;"></div>
      </div>
      <!-- Tracked Hours chart -->
      <div class="usage-chart-section">
        <span class="chart-label">TRACKED HOURS</span>
        <div id="hoursChart" style="width:100%;height:240px;"></div>
      </div>
      <!-- Account Health (internal-only) -->
      <div id="accountHealthGrid" class="internal-only" style="display:none;"></div>
    </div>
  </section>

  <!-- ANALYSIS -->
  <section class="analysis animate-in" style="animation-delay: 60ms">
    <div class="analysis-label">Attention needed</div>
    <div class="attention-callouts" id="attentionCallouts"></div>
    <div class="analysis-grid">
      <div class="analysis-box">
        <div class="chart-label">Velocity &mdash; last 6 months</div>
        <div id="velocityChart" class="velocity-chart"></div>

const STALE_DAYS = 30;
const VERY_STALE_DAYS = 60;
const RESOLVED_STATUSES = new Set(['Done', 'Closed', 'Resolved', 'Merged', 'Archive', 'Archived', "Won't Fix"]);
const STATUS_COLORS = {
  'Active': 'var(--blue)', 'In Progress': 'var(--blue)', 'In Review': 'var(--blue)',
  'In Development': 'var(--blue)', 'Selected for Development': 'var(--blue)',

  'Done': 'var(--green)', 'Closed': 'var(--green)', 'Resolved': 'var(--green)', 'Merged': 'var(--green)',
  'Archive': 'var(--gray)', 'Archived': 'var(--gray)', "Won't Fix": 'var(--gray)'
};
function statusColor(s) { return STATUS_COLORS[s] || 'var(--gray)'; }

const PRIO_COLORS = { P0: 'var(--red)', P1: 'var(--orange)', P2: 'var(--amber)', P3: 'var(--gray)' };
const PRIO_ORDER = ['P0', 'P1', 'P2', 'P3'];

const NOW = new Date(INTELLIGENCE_DATA.generated + 'T00:00:00');

// ── DATE HELPERS ──
function parseDate(s) {
  if (!s) return null;
  return new Date(s);
}

function daysBetween(a, b) {
  if (!a || !b) return null;
  return Math.floor((b - a) / (1000 * 60 * 60 * 24));
}

function daysAgo(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return Infinity;
  return daysBetween(d, NOW);
}

function monthKey(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return null;
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function monthLabel(key) {
  const [y, m] = key.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m) - 1] + ' ' + y.slice(2);
}

// ── HEALTH BUCKET CLASSIFICATION ──
function classifyIssue(issue) {
  if (RESOLVED_STATUSES.has(issue.status)) return 'resolved';
  if (issue.status === 'Triage') return 'triage';
  const engDays = daysAgo(issue.comments?.last_eng_comment_date);
  if (engDays <= STALE_DAYS && engDays !== Infinity) return 'active';
  return 'stale';
}

// ── FILTER STATE ──
const defaultStatuses = new Set(INTELLIGENCE_DATA.issues.map(i => i.status).filter(s => !RESOLVED_STATUSES.has(s)));
let activeFilters = { types: new Set(), statuses: new Set(defaultStatuses), priorities: new Set(), theme: 'all', search: '' };
let calloutFilter = null; // function that filters to callout matches

function getFiltered() {
  return INTELLIGENCE_DATA.issues.filter(i => {
    if (calloutFilter && !calloutFilter(i)) return false;
    if (activeFilters.types.size && !activeFilters.types.has(i.type)) return false;
    if (activeFilters.statuses.size && !activeFilters.statuses.has(i.status)) return false;
    if (activeFilters.priorities.size && !activeFilters.priorities.has(i.priority)) return false;
    if (activeFilters.theme !== 'all' && i.theme !== activeFilters.theme) return false;
    if (activeFilters.search) {
      const q = activeFilters.search.toLowerCase();
      return i.key.toLowerCase().includes(q) || i.summary.toLowerCase().includes(q) || (i.assignee || '').toLowerCase().includes(q);
    }
    return true;
  });
}

function countBy(arr, fn) {
  const m = {};
  arr.forEach(i => { const k = fn(i); m[k] = (m[k] || 0) + 1; });
  return m;
}

const ACTIONS_PRIO_ORDER = { 'P0': 0, 'P1': 1, 'P2': 2, 'P3': 3 };

let _actionsScope = 'my_tasks';
let _actionsExpanded = false;

function renderActionsPanel() {
  const container = document.getElementById('actionsPanel');
  const actions = INTELLIGENCE_DATA.actions;

  // Graceful degradation
  if (!actions || !actions.available) {
    const reason = actions && actions.reason === 'api_error'
      ? 'Asana data unavailable &mdash; API error during fetch'
      : 'Asana not configured for this customer';
    const hint = actions && actions.reason === 'api_error'
      ? 'Check ASANA_TOKEN in ~/.fe-skills/.env'
      : 'Add action_tracker_id to templates/customers.yaml, or run /asana-setup';
    container.innerHTML = `
      <div class="section-label">SE Actions</div>
      <div class="actions-unavailable">${reason}</div>
      <div class="actions-unavailable-hint">${hint}</div>`;
    return;
  }

  // Filter tasks by scope
  let tasks = actions.tasks || [];
  if (_actionsScope === 'my_tasks' && actions.current_user) {
    tasks = tasks.filter(t => t.assignee && t.assignee.gid === actions.current_user.gid);
  }

  // Sort: overdue first, then by priority (P0 > P1 > P2 > P3 > null), then by due date
  tasks.sort((a, b) => {
    if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
    const pa = ACTIONS_PRIO_ORDER[a.priority] !== undefined ? ACTIONS_PRIO_ORDER[a.priority] : 99;
    const pb = ACTIONS_PRIO_ORDER[b.priority] !== undefined ? ACTIONS_PRIO_ORDER[b.priority] : 99;
    if (pa !== pb) return pa - pb;
    if (a.due_on && b.due_on) return a.due_on.localeCompare(b.due_on);
    if (a.due_on) return -1;
    if (b.due_on) return 1;
    return 0;
  });

  // Group by status category
  const groups = { 'In Progress': [], 'Waiting': [], 'To Do': [], 'Other': [] };
  tasks.forEach(t => {
    if (t.section === 'In Progress') groups['In Progress'].push(t);
    else if (t.section === 'Waiting on Customer' || t.section === 'Waiting on Eng') groups['Waiting'].push(t);
    else if (t.section === 'To Do') groups['To Do'].push(t);
    else groups['Other'].push(t);
  });

  // Compute summary
  const summary = {
    total: tasks.length,
    in_progress: groups['In Progress'].length,
    waiting: groups['Waiting'].length,
    todo: groups['To Do'].length,
    overdue: tasks.filter(t => t.overdue).length,
    stale: tasks.filter(t => t.stale).length
  };

  // Build header
  const scopeLabel = _actionsScope === 'my_tasks' ? 'My Tasks' : 'Team';
  const otherScopeLabel = _actionsScope === 'my_tasks' ? 'Team' : 'My Tasks';

  let html = `<div class="actions-header">

    <span class="actions-count-badge">${summary.total}</span>
    <div class="actions-scope-toggle">

    </div>

  // Summary bar
  html += `<div class="actions-summary-bar">
    <span class="actions-stat">
      <span class="actions-stat-dot" style="background:var(--blue)"></span>
      <span class="actions-stat-count">${summary.in_progress}</span>
      <span class="actions-stat-label">In Progress</span>
    </span>
    <span class="actions-stat">
      <span class="actions-stat-dot" style="background:var(--orange)"></span>
      <span class="actions-stat-count">${summary.waiting}</span>
      <span class="actions-stat-label">Waiting</span>

      <span class="actions-stat-dot" style="background:var(--amber)"></span>

    html += `<span class="actions-stat">
      <span class="actions-stat-dot" style="background:var(--red)"></span>
      <span class="actions-stat-count" style="color:var(--red)">${summary.overdue}</span>
      <span class="actions-stat-label">Overdue</span>
    </span>`;
  }
  if (summary.stale > 0) {
    html += `<span class="actions-stat">
      <span class="actions-stat-dot" style="background:var(--amber)"></span>
      <span class="actions-stat-count" style="color:var(--amber)">${summary.stale}</span>
      <span class="actions-stat-label">Stale</span>
    </span>`;
  }
  html += `</div>`;

  // Task list by group
  const showTeamAssignee = _actionsScope === 'team';
  const maxVisible = 10;
  let taskIndex = 0;

  const groupOrder = ['In Progress', 'Waiting', 'To Do', 'Other'];
  groupOrder.forEach(groupName => {
    const groupTasks = groups[groupName];
    if (groupTasks.length === 0) return;

    html += `<div class="actions-group-label">${groupName} (${groupTasks.length})</div>`;
    html += `<div class="actions-task-list">`;

    groupTasks.forEach(t => {
      taskIndex++;
      const hidden = !_actionsExpanded && taskIndex > maxVisible ? ' style="display:none" data-actions-overflow' : '';

      // Priority dot
      const priClass = t.priority ? t.priority.toLowerCase() : 'none';

      // Section pill
      const secColor = ACTIONS_SECTION_COLORS[t.section] || { bg: 'var(--gray-dim)', color: 'var(--gray)' };

      // Due date
      let dueHtml = '';
      if (t.due_on) {
        const dueDate = new Date(t.due_on + 'T00:00:00');
        const dueLabel = dueDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        if (t.overdue) {
          dueHtml = `<span class="actions-due overdue">${dueLabel} overdue</span>`;
        } else {
          dueHtml = `<span class="actions-due">${dueLabel}</span>`;
        }
      }

      // Stale indicator
      let staleHtml = '';
      if (t.stale) {
        staleHtml = `<span class="actions-stale-indicator" title="Stale: ${t.stale_days || '7+'}d since last update"></span>`;
      }

      // Linked Jira badge
      let jiraHtml = '';
      if (t.linked_jira) {
        jiraHtml = `<a class="actions-jira-badge" href="https://coreweave.atlassian.net/browse/${t.linked_jira}" target="_blank" rel="noopener">${t.linked_jira}</a>`;
      }

      // Assignee (team view only)
      let assigneeHtml = '';
      if (showTeamAssignee && t.assignee) {
        assigneeHtml = `<span class="actions-assignee">${t.assignee.name}</span>`;
      }

      // Task name (strip Jira reference from display name for cleanliness)
      let displayName = t.name;
      if (t.linked_jira) {
        displayName = displayName.replace(/\s*\(WB-\d+\)\s*$/, '');
      }

      html += `<div class="actions-task-row"${hidden}>
        <span class="actions-priority-dot ${priClass}" title="${t.priority || 'No priority'}"></span>
        <a class="actions-task-name" href="${t.url || '#'}" target="_blank" rel="noopener" title="${t.name}">${displayName}</a>
        <span class="actions-section-pill" style="background:${secColor.bg};color:${secColor.color}">${t.section}</span>
        ${dueHtml}
        ${staleHtml || jiraHtml ? '<span style="display:flex;align-items:center;gap:6px">' + staleHtml + jiraHtml + '</span>' : ''}
        ${assigneeHtml}
      </div>`;
    });

    html += `</div>`;
  });

  // Show all / collapse link
  if (tasks.length > maxVisible) {
    if (_actionsExpanded) {
      html += `<div class="actions-expand-link" id="actionsExpandLink">Show fewer</div>`;
    } else {
      html += `<div class="actions-expand-link" id="actionsExpandLink">Show all ${tasks.length} tasks</div>`;
    }
  }

  // Project link
  if (actions.project_url) {
    html += `<div style="margin-top:8px;font-family:var(--font-mono);font-size:10px">
      <a href="${actions.project_url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">Open in Asana &rarr;</a>
    </div>`;
  }

  container.innerHTML = html;

  // Wire scope toggle
  container.querySelectorAll('[data-actions-scope]').forEach(btn => {
    btn.addEventListener('click', () => {
      _actionsScope = btn.dataset.actionsScope;
      _actionsExpanded = false;
      renderActionsPanel();
    });
  });

  // Wire expand/collapse
  const expandLink = document.getElementById('actionsExpandLink');
  if (expandLink) {
    expandLink.addEventListener('click', () => {
      _actionsExpanded = !_actionsExpanded;
      renderActionsPanel();
    });
  }
}

// ── ASANA BADGES ON JIRA ISSUES (bidirectional cross-link) ──
function addAsanaBadgesToJiraIssues() {
  const actions = INTELLIGENCE_DATA.actions;
  if (!actions || !actions.available || !actions.tasks) return;

  // Build lookup: Jira key -> Asana task URL
  const jiraToAsana = {};
  actions.tasks.forEach(t => {
    if (t.linked_jira) {
      jiraToAsana[t.linked_jira] = t.url || '#';
    }
  });

  if (Object.keys(jiraToAsana).length === 0) return;

  // Find all Jira issue key links in the issue table
  document.querySelectorAll('.issue-key').forEach(el => {
    const key = el.textContent.trim();
    if (jiraToAsana[key]) {
      // Add an Asana badge next to the issue key
      const badge = document.createElement('a');
      badge.className = 'asana-badge';
      badge.href = jiraToAsana[key];
      badge.target = '_blank';
      badge.rel = 'noopener';
      badge.textContent = 'A';
      badge.title = 'View linked Asana task';
      el.parentElement.appendChild(badge);
    }
  });
}

// ── TRENDING COMPUTATION ──
let _cachedTrending = null;
let _cachedThemeRecurrence = null;

function computeTrending(issues) {
  const lookbackMonths = INTELLIGENCE_DATA.config?.trending_months || 6;
  const cutoff = new Date(NOW);
  cutoff.setMonth(cutoff.getMonth() - lookbackMonths);

  const months = {};

  // Seed months so we always have a contiguous range
  for (let i = 0; i < lookbackMonths; i++) {
    const d = new Date(NOW);
    d.setMonth(d.getMonth() - i);
    const mk = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    if (!months[mk]) months[mk] = { opened: 0, closed: 0 };
  }

  issues.forEach(issue => {
    const created = parseDate(issue.created);
    if (!created || created < cutoff) return;

    const mk = monthKey(issue.created);
    if (mk) {
      if (!months[mk]) months[mk] = { opened: 0, closed: 0 };
      months[mk].opened++;
    }

    // Count closed in the month they were resolved
    if (RESOLVED_STATUSES.has(issue.status)) {
      const resolvedDate = issue.resolutiondate || issue.updated;
      const resolved = parseDate(resolvedDate);
      if (resolved && resolved >= cutoff) {
        const rk = monthKey(resolvedDate);
        if (rk) {
          if (!months[rk]) months[rk] = { opened: 0, closed: 0 };
          months[rk].closed++;
        }
      }
    }
  });

  const sorted = Object.keys(months).sort().slice(-lookbackMonths);
  const totalOpened = sorted.reduce((s, m) => s + months[m].opened, 0);
  const totalClosed = sorted.reduce((s, m) => s + months[m].closed, 0);

  // Ratio and trend
  const ratio = totalClosed > 0 ? +(totalOpened / totalClosed).toFixed(2) : null;
  const trend = totalOpened > totalClosed ? 'growing' : totalOpened < totalClosed ? 'shrinking' : 'stable';

  // Median time to resolution (using resolutiondate, falling back to updated)
  const resolutionDays = issues
    .filter(i => RESOLVED_STATUSES.has(i.status))
    .map(i => {
      const created = parseDate(i.created);
      const resolved = parseDate(i.resolutiondate || i.updated);
      return created && resolved ? daysBetween(created, resolved) : null;
    })
    .filter(d => d !== null && d >= 0)
    .sort((a, b) => a - b);

  const median = resolutionDays.length > 0
    ? resolutionDays[Math.floor(resolutionDays.length / 2)]
    : null;

  // P90
  const p90 = resolutionDays.length > 0
    ? resolutionDays[Math.floor(resolutionDays.length * 0.9)]
    : null;

  return {
    months: sorted.map(m => ({ key: m, label: monthLabel(m), opened: months[m].opened, closed: months[m].closed })),
    ratio: {
      total_opened: totalOpened,
      total_closed: totalClosed,
      ratio: ratio,
      trend: trend
    },
    resolution: {
      median_days: median,
      p90_days: p90
    }
  };
}

function computeThemeRecurrence(issues) {
  const lookbackMonths = INTELLIGENCE_DATA.config?.trending_months || 6;
  const cutoff = new Date(NOW);
  cutoff.setMonth(cutoff.getMonth() - lookbackMonths);

  const themeCounts = {};
  issues.forEach(i => {
    const created = parseDate(i.created);
    if (!created || created < cutoff) return;
    themeCounts[i.theme] = (themeCounts[i.theme] || 0) + 1;
  });

  return Object.entries(themeCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
    .map(([theme, count]) => ({ theme, count }));
}

function renderTrendingCharts() {
  const container = document.getElementById('trendingCharts');
  const issues = INTELLIGENCE_DATA.issues;

  if (!issues || issues.length === 0) {
    container.innerHTML = `
      <div class="section-label">Trending</div>
      <div style="color:var(--text-tertiary);font-size:13px;margin-top:12px">No trending data for this period.</div>`;
    return;
  }

  const trending = computeTrending(issues);
  const themeRecurrence = computeThemeRecurrence(issues);
  _cachedTrending = trending;
  _cachedThemeRecurrence = themeRecurrence;

  const lookbackMonths = INTELLIGENCE_DATA.config?.trending_months || 6;

  let html = `<div class="section-label">Trending</div>`;
  html += `<div class="trending-grid">`;

  // ── (a) Opened/Closed bar chart ──
  html += `<div class="trending-subsection">`;
  html += `<div class="section-label">Opened vs Closed &mdash; last ${lookbackMonths} months</div>`;

  if (trending.months.length === 0) {
    html += `<div style="color:var(--text-tertiary);font-size:13px">No data in this window.</div>`;
  } else {
    const maxVal = Math.max(...trending.months.map(m => Math.max(m.opened, m.closed)), 1);
    html += `<div class="trending-bar-chart">`;
    trending.months.forEach(m => {
      const oPct = (m.opened / maxVal) * 100;
      const cPct = (m.closed / maxVal) * 100;
      html += `<div class="trending-bar-row">
        <span class="trending-bar-month">${m.label}</span>
        <div class="trending-bar-pair">
          <div class="trending-bar opened" style="width:${Math.max(oPct, 2)}%" title="Opened: ${m.opened}"></div>
          <div class="trending-bar closed" style="width:${Math.max(cPct, 2)}%" title="Closed: ${m.closed}"></div>
        </div>
      </div>`;
    });
    html += `</div>`;
    html += `<div class="trending-legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--amber);opacity:0.75"></span>Opened</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--green);opacity:0.75"></span>Closed</span>
    </div>`;
  }
  html += `</div>`;

  // ── (b) Ratio metric + (c) Resolution velocity ──
  html += `<div class="trending-subsection">`;

  // Ratio
  html += `<div class="section-label">Raised-to-Resolved Ratio</div>`;
  const ratioDisplay = trending.ratio.ratio !== null ? trending.ratio.ratio.toFixed(2) : 'N/A';
  const trendArrow = trending.ratio.trend === 'growing' ? '\u2191' : trending.ratio.trend === 'shrinking' ? '\u2193' : '\u2014';
  const trendClass = trending.ratio.trend;
  html += `<div style="margin-top:4px">
    <span class="trending-metric-large">${ratioDisplay}</span>
    <span class="trend-indicator ${trendClass}">${trendArrow}</span>
  </div>`;
  html += `<div class="trending-metric-period">Last ${lookbackMonths} months &mdash; ${trending.ratio.total_opened} opened, ${trending.ratio.total_closed} closed</div>`;

  // Resolution velocity
  html += `<div class="section-label" style="margin-top:20px">Median Time to Resolution</div>`;
  if (trending.resolution.median_days !== null) {
    html += `<div style="margin-top:4px">
      <span class="trending-metric-large">${trending.resolution.median_days}d</span>
    </div>`;
    if (trending.resolution.p90_days !== null) {
      html += `<div class="trending-metric-secondary internal-only">P90: ${trending.resolution.p90_days} days</div>`;
    }
  } else {
    html += `<div class="trending-metric-secondary" style="margin-top:4px">No resolved issues in this period</div>`;
  }

  html += `</div>`;

  // ── (d) Theme recurrence ──
  html += `<div class="trending-subsection" style="grid-column:1/-1">`;
  html += `<div class="section-label">Recurring Themes (${lookbackMonths} mo)</div>`;
  if (themeRecurrence.length === 0) {
    html += `<div style="color:var(--text-tertiary);font-size:13px">No themes in this window.</div>`;
  } else {
    const maxCount = Math.max(...themeRecurrence.map(t => t.count), 1);
    html += `<div class="theme-recurrence-list">`;
    themeRecurrence.forEach(t => {
      const pct = (t.count / maxCount) * 100;
      const label = t.theme.length > 20 ? t.theme.slice(0, 18) + '...' : t.theme;
      html += `<div class="theme-recurrence-row">
        <span class="theme-recurrence-label" title="${t.theme}">${label}</span>
        <div class="bar-track">
          <div class="bar-segment" style="width:${Math.max(pct, 3)}%;background:var(--accent)"></div>
        </div>
        <span class="theme-recurrence-count">${t.count}</span>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  html += `</div>`; // close trending-grid
  container.innerHTML = html;
}

// ── EXECUTIVE SUMMARY ──
function renderExecSummary() {
  const container = document.getElementById('execSummary');
  const issues = INTELLIGENCE_DATA.issues;
  const sentiment = INTELLIGENCE_DATA.sentiment;

  // Compute trending if not cached
  if (!_cachedTrending) {
    _cachedTrending = computeTrending(issues);
    _cachedThemeRecurrence = computeThemeRecurrence(issues);
  }
  const trending = _cachedTrending;

  let html = `<div class="section-label">Executive Summary</div>`;
  html += `<div class="exec-summary-grid">`;

  // ── 1. HEALTH SNAPSHOT ──
  html += `<div class="exec-subsection">`;
  html += `<div class="section-label">Health Snapshot</div>`;

  // Sentiment label
  if (sentiment && sentiment.available && sentiment.overall) {
    const scoreClass = sentiment.overall.score;
    const scoreLabel = SENTIMENT_LABELS[sentiment.overall.score] || sentiment.overall.score;
    html += `<div class="exec-metric-inline">
      <span class="exec-metric-label">Sentiment:</span>
      <span class="exec-metric-value" style="color:${SENTIMENT_COLOURS[sentiment.overall.score] || 'var(--text-secondary)'}">${scoreLabel}</span>
    </div>`;
  } else {
    html += `<div class="exec-metric-inline">
      <span class="exec-metric-label">Sentiment:</span>
      <span class="exec-metric-value exec-muted">No Slack data</span>
    </div>`;
  }

  // Backlog trajectory (3-month window)
  const threeMonthsAgo = new Date(NOW);
  threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
  let recentOpened = 0, recentClosed = 0;
  issues.forEach(i => {
    const created = parseDate(i.created);
    if (created && created >= threeMonthsAgo) recentOpened++;
    if (RESOLVED_STATUSES.has(i.status)) {
      const resolved = parseDate(i.resolutiondate || i.updated);
      if (resolved && resolved >= threeMonthsAgo) recentClosed++;
    }
  });
  const trajectory = recentOpened > recentClosed ? 'Growing' : recentOpened < recentClosed ? 'Shrinking' : 'Stable';
  const trajColor = trajectory === 'Growing' ? 'var(--amber)' : trajectory === 'Shrinking' ? 'var(--green)' : 'var(--text-secondary)';
  const trajArrow = trajectory === 'Growing' ? '\u2191' : trajectory === 'Shrinking' ? '\u2193' : '\u2014';
  html += `<div class="exec-metric-inline">
    <span class="exec-metric-label">Backlog:</span>
    <span class="exec-metric-value" style="color:${trajColor}">${trajectory} ${trajArrow}</span>
  </div>`;

  // Staleness
  const nonResolved = issues.filter(i => !RESOLVED_STATUSES.has(i.status));
  let staleCount = 0, veryStaleCount = 0;
  nonResolved.forEach(i => {
    const bucket = classifyIssue(i);
    if (bucket === 'stale') {
      const engDays = daysAgo(i.comments?.last_eng_comment_date);
      if (engDays > VERY_STALE_DAYS) veryStaleCount++;
      else staleCount++;
    }
  });
  if (staleCount === 0 && veryStaleCount === 0) {
    html += `<div class="exec-metric-inline">
      <span class="exec-metric-label">No update ${STALE_DAYS}d+:</span>
      <span class="exec-metric-value" style="color:var(--green)">0</span>
    </div>`;
  } else {
    if (staleCount > 0) html += `<div class="exec-metric-inline">
      <span class="exec-metric-label">No update ${STALE_DAYS}d+:</span>
      <span class="exec-metric-value" style="color:var(--amber)">${staleCount}</span>
    </div>`;
    if (veryStaleCount > 0) html += `<div class="exec-metric-inline">
      <span class="exec-metric-label">No update ${VERY_STALE_DAYS}d+:</span>
      <span class="exec-metric-value" style="color:var(--red)">${veryStaleCount}</span>
    </div>`;
  }

  // Asana action counts
  const actionsData = INTELLIGENCE_DATA.actions;
  if (actionsData && actionsData.available) {
    const actSummary = actionsData.summary || {};
    const actTotal = actSummary.total || (actionsData.tasks ? actionsData.tasks.length : 0);
    const actOverdue = actSummary.overdue || (actionsData.tasks ? actionsData.tasks.filter(t => t.overdue).length : 0);
    const overdueText = actOverdue > 0 ? ` (${actOverdue} overdue)` : '';
    const overdueColor = actOverdue > 0 ? 'var(--red)' : 'var(--accent)';
    html += `<div class="exec-metric-inline">
      <span class="exec-metric-label">SE Actions:</span>
      <span class="exec-metric-value" style="color:${overdueColor}">${actTotal} open${overdueText}</span>
    </div>`;
  }

  html += `</div>`; // close health snapshot

  // ── 2. HOT ITEMS ──
  html += `<div class="exec-subsection">`;
  html += `<div class="section-label">Worst Offenders</div>`;

  const hotItems = [];

  // (a) Stale high-priority tickets (P0/P1)
  const staleHighPri = nonResolved
    .filter(i => (i.priority === 'P0' || i.priority === 'P1') && classifyIssue(i) === 'stale')
    .map(i => {
      const engDays = daysAgo(i.comments?.last_eng_comment_date);
      const daysLabel = engDays === Infinity ? 'no eng activity' : `${engDays}d no eng activity`;
      const tierLabel = engDays > VERY_STALE_DAYS ? `${VERY_STALE_DAYS}d+ silent` : `${STALE_DAYS}d+ silent`;
      return {
        type: 'stale_ticket',
        label: tierLabel,
        title: `${i.key}: ${i.summary}`,
        detail: `${i.priority}, ${daysLabel}`,
        url: i.url || '#',
        staleness: engDays,
        internal_note: null
      };
    })
    .sort((a, b) => b.staleness - a.staleness);

  hotItems.push(...staleHighPri);

  // (b) Negative Slack threads
  if (sentiment && sentiment.available && sentiment.hot_threads) {
    sentiment.hot_threads.slice(0, 3).forEach(t => {
      hotItems.push({
        type: 'negative_thread',
        title: t.summary,
        detail: `${t.message_count || 0} msgs, ${t.participants || 0} people`,
        url: t.url || null,
        staleness: 0,
        internal_note: null
      });
    });
  }

  // Also add risk signals as internal notes on hot threads
  if (sentiment && sentiment.internal && sentiment.internal.risk_signals) {
    // Attach to first hot item or create standalone
    sentiment.internal.risk_signals.slice(0, 2).forEach(rs => {
      if (hotItems.length < 5) {
        hotItems.push({
          type: 'escalation',
          title: rs,
          detail: 'risk signal',
          url: null,
          staleness: 0,
          internal_note: null,
          internalOnly: true
        });
      }
    });
  }

  const displayItems = hotItems.slice(0, 5);

  if (displayItems.length === 0) {
    html += `<div style="color:var(--text-tertiary);font-size:13px;padding:8px 0">No urgent items</div>`;
  } else {
    displayItems.forEach(item => {
      const internalClass = item.internalOnly ? ' internal-only' : '';
      const linkHtml = item.url ? `<a class="exec-hot-link" href="${item.url}" target="_blank" rel="noopener">View</a>` : '';
      html += `<div class="exec-hot-item${internalClass}">
        <span class="exec-hot-badge ${item.type}">${item.label || item.type.replace('_', ' ')}</span>
        <span class="exec-hot-title">${item.title}</span>
        <span class="exec-hot-detail">${item.detail}</span>
        ${linkHtml}
      </div>`;
      if (item.internal_note) {
        html += `<div class="exec-hot-internal internal-only">${item.internal_note}</div>`;
      }
    });
  }

  html += `</div>`; // close hot items

  // ── 3. TRENDING METRICS (compact summary) ──
  html += `<div class="exec-subsection">`;
  html += `<div class="section-label">Trending Metrics</div>`;

  const lookbackMonths = INTELLIGENCE_DATA.config?.trending_months || 6;
  const ratioDisplay = trending.ratio.ratio !== null ? trending.ratio.ratio.toFixed(2) : 'N/A';
  const trendArrow = trending.ratio.trend === 'growing' ? '\u2191' : trending.ratio.trend === 'shrinking' ? '\u2193' : '\u2014';
  const trendColor = trending.ratio.trend === 'growing' ? 'var(--amber)' : trending.ratio.trend === 'shrinking' ? 'var(--green)' : 'var(--text-secondary)';

  html += `<div class="exec-metric-inline">
    <span class="exec-metric-label">This period:</span>
    <span class="exec-metric-value">${trending.ratio.total_opened} opened / ${trending.ratio.total_closed} closed</span>
  </div>`;
  html += `<div class="exec-metric-inline">
    <span class="exec-metric-label">Ratio:</span>
    <span class="exec-metric-value" style="color:${trendColor}">${ratioDisplay} <span style="font-size:12px">${trendArrow}</span></span>
  </div>`;
  html += `<div class="exec-metric-inline">
    <span class="exec-metric-label">Resolution:</span>
    <span class="exec-metric-value">${trending.resolution.median_days !== null ? trending.resolution.median_days + 'd median' : 'No resolved issues'}</span>
  </div>`;

  // Top recurring theme
  if (_cachedThemeRecurrence && _cachedThemeRecurrence.length > 0) {
    html += `<div class="exec-metric-inline">
      <span class="exec-metric-label">Top theme:</span>
      <span class="exec-metric-value">${_cachedThemeRecurrence[0].theme} (${_cachedThemeRecurrence[0].count})</span>
    </div>`;
  }

  html += `</div>`; // close trending metrics

  // ── 4. ENGAGEMENT CADENCE ──
  html += `<div class="exec-subsection">`;
  html += `<div class="section-label">Engagement Cadence</div>`;

  // Last Slack activity
  let lastSlack = 'No Slack data';
  let lastSlackColor = 'var(--text-tertiary)';
  if (sentiment && sentiment.available && sentiment.period && sentiment.period.end) {
    const slackDays = daysAgo(sentiment.period.end);
    lastSlack = slackDays <= 0 ? 'Today' : `${slackDays}d ago (${sentiment.period.end})`;
    lastSlackColor = slackDays <= 7 ? 'var(--green)' : slackDays <= 14 ? 'var(--amber)' : 'var(--red)';
  }

  html += `<div class="exec-engagement-row">
    <span class="exec-engagement-value" style="color:${lastSlackColor}">${lastSlack}</span>
    <span class="exec-engagement-label">Last Slack activity</span>
  </div>`;

  // Days since last FE-UPDATE
  let lastFeUpdate = null;
  issues.forEach(i => {
    if (i.comments && i.comments.fe_update_count > 0 && i.comments.last_comment_date) {
      const d = parseDate(i.comments.last_comment_date);
      if (d && (!lastFeUpdate || d > lastFeUpdate)) lastFeUpdate = d;
    }
  });

  if (lastFeUpdate) {
    const feUpdateDays = daysBetween(lastFeUpdate, NOW);
    const feColor = feUpdateDays <= 7 ? 'var(--green)' : feUpdateDays <= 14 ? 'var(--amber)' : 'var(--red)';
    html += `<div class="exec-engagement-row">
      <span class="exec-engagement-value" style="color:${feColor}">${feUpdateDays}d ago</span>
      <span class="exec-engagement-label">Last FE-UPDATE</span>
    </div>`;
  } else {
    html += `<div class="exec-engagement-row">
      <span class="exec-engagement-value exec-muted">None</span>
      <span class="exec-engagement-label">Last FE-UPDATE</span>
    </div>`;
  }

  // Last call date (null -- Granola deferred to Phase 8)
  html += `<div class="exec-engagement-row">
    <span class="exec-engagement-value exec-muted">No data source</span>
    <span class="exec-engagement-label">Last call</span>
  </div>`;

  html += `</div>`; // close engagement cadence

  html += `</div>`; // close exec-summary-grid
  container.innerHTML = html;
}

// ── HEALTH BUCKETS ──
function renderHealthBuckets() {
  const all = INTELLIGENCE_DATA.issues;
  const buckets = { triage: 0, active: 0, stale: 0, resolved: 0 };
  all.forEach(i => { buckets[classifyIssue(i)]++; });

  const total = all.length;
  const colors = { triage: 'var(--orange)', active: 'var(--green)', stale: 'var(--red)', resolved: 'var(--gray)' };

  for (const key of ['triage', 'active', 'stale', 'resolved']) {

      <div class="bucket-value" style="color:${colors[key]}">${buckets[key]}</div>

// ── ATTENTION CALLOUTS ──
function renderAttentionCallouts() {
  const all = INTELLIGENCE_DATA.issues;
  const nonResolved = all.filter(i => !RESOLVED_STATUSES.has(i.status));

  const neverCommented = nonResolved.filter(i => !i.comments || i.comments.comment_count === 0);
  const veryStale = nonResolved.filter(i => {
    if (!i.comments || i.comments.comment_count === 0) return true;
    return daysAgo(i.comments.last_eng_comment_date) > VERY_STALE_DAYS;
  });
  const recentlyOpened = all.filter(i => daysAgo(i.created) <= 30);
  const unassigned = nonResolved.filter(i => !i.assignee);

  const callouts = [];

  if (neverCommented.length > 0) {
    callouts.push({
      count: neverCommented.length,
      text: `ticket${neverCommented.length !== 1 ? 's have' : ' has'} never been commented on`,
      severity: 'high',
      filterFn: i => !i.comments || i.comments.comment_count === 0
    });
  }

  if (veryStale.length > 0) {
    callouts.push({
      count: veryStale.length,
      text: `ticket${veryStale.length !== 1 ? 's have' : ' has'} had no eng activity in ${VERY_STALE_DAYS}+ days`,
      severity: 'medium',
      filterFn: i => {
        if (RESOLVED_STATUSES.has(i.status)) return false;
        if (!i.comments || i.comments.comment_count === 0) return true;
        return daysAgo(i.comments.last_eng_comment_date) > VERY_STALE_DAYS;
      }
    });
  }

  if (unassigned.length > 0) {
    callouts.push({
      count: unassigned.length,
      text: `open ticket${unassigned.length !== 1 ? 's are' : ' is'} unassigned`,
      severity: 'low',
      filterFn: i => !RESOLVED_STATUSES.has(i.status) && !i.assignee
    });
  }

  if (recentlyOpened.length > 0) {
    callouts.push({
      count: recentlyOpened.length,
      text: `ticket${recentlyOpened.length !== 1 ? 's' : ''} opened in the last 30 days`,
      severity: 'info',
      filterFn: i => daysAgo(i.created) <= 30
    });
  }

  const container = document.getElementById('attentionCallouts');
  if (callouts.length === 0) {
    container.innerHTML = '<div style="color:var(--text-tertiary);font-size:13px;padding:8px 0">No issues requiring immediate attention.</div>';
    return;
  }

  container.innerHTML = callouts.map((c, idx) =>
    `<div class="callout severity-${c.severity}" data-callout-idx="${idx}">
      <span class="callout-count">${c.count}</span>
      <span class="callout-text">${c.text}</span>
      <span class="callout-action">View tickets &#8594;</span>
    </div>`
  ).join('');

  // Bind click handlers
  container.querySelectorAll('.callout').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.calloutIdx);
      const c = callouts[idx];
      // Apply callout filter WITHOUT changing status/type/priority filters
      // The callout filter function handles its own status logic
      calloutFilter = c.filterFn;
      // Override status filter to "All" so callout results aren't hidden
      activeFilters.statuses = new Set();
      document.querySelectorAll('#statusFilters .pill').forEach(p => p.classList.remove('active'));
      const allPill = document.querySelector('#statusFilters [data-value="__all__"]');
      if (allPill) allPill.classList.add('active');

      document.getElementById('clearCalloutFilter').style.display = '';
      // Highlight active callout
      container.querySelectorAll('.callout').forEach(c => c.style.opacity = '0.5');
      el.style.opacity = '1';

      render();
      // Auto-expand all themes so results are visible
      document.querySelectorAll('.theme-section.collapsed').forEach(s => s.classList.remove('collapsed'));
      const btn = document.getElementById('expandCollapseAll');
      if (btn) btn.textContent = 'Collapse All';

      document.querySelector('.issue-list-section').scrollIntoView({ behavior: 'smooth' });
    });
  });
}

// ── VELOCITY CHART ──
function renderVelocityChart() {
  const all = INTELLIGENCE_DATA.issues;
  const monthsOpened = {};
  const monthsResolved = {};

  all.forEach(i => {
    const mk = monthKey(i.created);
    if (mk) monthsOpened[mk] = (monthsOpened[mk] || 0) + 1;
    if (RESOLVED_STATUSES.has(i.status)) {
      const rk = monthKey(i.updated);
      if (rk) monthsResolved[rk] = (monthsResolved[rk] || 0) + 1;
    }
  });

  // Last 6 months
  const allMonths = new Set([...Object.keys(monthsOpened), ...Object.keys(monthsResolved)]);
  const sorted = [...allMonths].sort().slice(-6);

  if (sorted.length === 0) {
    document.getElementById('velocityChart').innerHTML = '<div style="color:var(--text-tertiary);font-size:13px">No velocity data available.</div>';
    return;
  }

  const maxVal = Math.max(...sorted.map(m => Math.max(monthsOpened[m] || 0, monthsResolved[m] || 0)), 1);

  let html = '';
  sorted.forEach(m => {
    const opened = monthsOpened[m] || 0;
    const resolved = monthsResolved[m] || 0;
    const oPct = (opened / maxVal) * 100;
    const rPct = (resolved / maxVal) * 100;
    html += `<div class="velocity-row">
      <span class="velocity-month">${monthLabel(m)}</span>
      <div class="velocity-bars">
        <div class="velocity-bar opened" style="width:${Math.max(oPct, 2)}%" title="Opened: ${opened}"></div>
        <div class="velocity-bar resolved" style="width:${Math.max(rPct, 2)}%" title="Resolved: ${resolved}"></div>
      </div>
    </div>`;
  });

  html += `<div class="velocity-legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--red);opacity:0.75"></span>Opened</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--green);opacity:0.75"></span>Resolved</span>
  </div>`;

  // Net change summary
  const totalOpened = sorted.reduce((s, m) => s + (monthsOpened[m] || 0), 0);
  const totalResolved = sorted.reduce((s, m) => s + (monthsResolved[m] || 0), 0);
  const net = totalOpened - totalResolved;
  const trend = net > 0 ? `+${net} net (backlog growing)` : net < 0 ? `${net} net (backlog shrinking)` : 'balanced';
  html += `<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:6px">${totalOpened} opened, ${totalResolved} resolved &mdash; ${trend}</div>`;

  document.getElementById('velocityChart').innerHTML = html;
}

// ── RESPONSE CADENCE ──
function renderCadenceMetrics() {
  const all = INTELLIGENCE_DATA.issues;
  const responseTimes = [];

  all.forEach(i => {
    if (!i.comments || !i.comments.first_comment_date) return;
    const created = parseDate(i.created);
    const first = parseDate(i.comments.first_comment_date);
    if (created && first) {
      const days = daysBetween(created, first);
      if (days >= 0) responseTimes.push(days);
    }
  });

  const neverCommented = all.filter(i => !i.comments || i.comments.comment_count === 0).length;
  const totalWithComments = all.length - neverCommented;

  if (responseTimes.length === 0) {
    document.getElementById('cadenceMetrics').innerHTML = '<div style="color:var(--text-tertiary);font-size:13px">No comment data available.</div>';
    return;
  }

  responseTimes.sort((a, b) => a - b);
  const median = responseTimes[Math.floor(responseTimes.length / 2)];
  const avg = Math.round(responseTimes.reduce((s, v) => s + v, 0) / responseTimes.length);
  const within7 = responseTimes.filter(d => d <= 7).length;
  const within7Pct = Math.round((within7 / all.length) * 100);

  let html = `
    <div class="cadence-metric">
      <div class="cadence-value" style="color:${median <= 7 ? 'var(--green)' : median <= 14 ? 'var(--amber)' : 'var(--red)'}">${median}d</div>
      <div class="cadence-label">Median time to first comment</div>
      <div class="cadence-context">Average: ${avg} days</div>
    </div>
    <div class="cadence-metric">
      <div class="cadence-value" style="color:${within7Pct >= 70 ? 'var(--green)' : within7Pct >= 40 ? 'var(--amber)' : 'var(--red)'}">${within7Pct}%</div>
      <div class="cadence-label">Tickets with response within 7 days</div>
      <div class="cadence-context">${within7} of ${all.length} tickets</div>
    </div>
    <div class="cadence-metric">
      <div class="cadence-value" style="color:${neverCommented === 0 ? 'var(--green)' : neverCommented <= 5 ? 'var(--amber)' : 'var(--red)'}">${neverCommented}</div>
      <div class="cadence-label">Tickets with zero comments</div>
      <div class="cadence-context">${Math.round((neverCommented / all.length) * 100)}% of all tickets</div>
    </div>`;

  document.getElementById('cadenceMetrics').innerHTML = html;
}

// ── THEME CHART ──
let initialRender = true;

function renderThemeChart(filtered) {
  const themes = [...new Set(INTELLIGENCE_DATA.issues.map(i => i.theme))];
  const themeBugs = {}, themeFRs = {};
  filtered.forEach(i => {
    if (i.type === 'Bug') themeBugs[i.theme] = (themeBugs[i.theme] || 0) + 1;
    else themeFRs[i.theme] = (themeFRs[i.theme] || 0) + 1;
  });

  const sorted = themes
    .map(t => ({ name: t, bugs: themeBugs[t] || 0, frs: themeFRs[t] || 0, total: (themeBugs[t] || 0) + (themeFRs[t] || 0) }))
    .filter(t => t.total > 0)
    .sort((a, b) => b.total - a.total);

  const maxCount = Math.max(...sorted.map(t => t.total), 1);
  const animClass = initialRender ? ' animate' : '';

  let html = '';
  sorted.forEach(t => {
    const bugPct = (t.bugs / maxCount) * 100;
    const frPct = (t.frs / maxCount) * 100;
    const label = t.name.length > 20 ? t.name.slice(0, 18) + '...' : t.name;
    html += `<div class="bar-row">
      <span class="bar-row-label" title="${t.name}">${label}</span>
      <div class="bar-track">
        <div class="bar-segment${animClass}" style="width:${bugPct}%;background:var(--red)"></div>
        <div class="bar-segment${animClass}" style="width:${frPct}%;background:var(--blue);animation-delay:0.1s"></div>
      </div>
      <span class="bar-row-count">${t.total}</span>
    </div>`;
  });

  html += `<div class="stacked-bar-legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>Bug</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>Feature Request</span>
  </div>`;

  document.getElementById('themeChart').innerHTML = html;
}

// ── FILTERS ──
function buildFilterGroup(containerId, items, filterKey, opts) {
  opts = opts || {};
  const el = document.getElementById(containerId);
  const defaults = activeFilters[filterKey];
  const hasDefaults = defaults instanceof Set && defaults.size > 0;
  let html = '<button class="pill' + (!hasDefaults ? ' active' : '') + '" data-value="__all__">All</button>';
  items.forEach(item => {
    const label = typeof item === 'object' ? item.label : item;
    const value = typeof item === 'object' ? item.value : item;
    const isActive = hasDefaults && value.split(',').every(v => defaults.has(v));
    html += '<button class="pill' + (isActive ? ' active' : '') + '" data-value="' + value + '">' + label + '</button>';
  });
  if (opts.compounds) {
    opts.compounds.forEach(c => {
      const isActive = hasDefaults && c.value.split(',').every(v => defaults.has(v));
      html += '<button class="pill' + (isActive ? ' active' : '') + '" data-value="' + c.value + '">' + c.label + '</button>';
    });
  }
  el.innerHTML = html;

  el.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const allBtn = el.querySelector('[data-value="__all__"]');
      if (btn.dataset.value === '__all__') {
        el.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        activeFilters[filterKey] = new Set();
      } else {
        allBtn.classList.remove('active');
        btn.classList.toggle('active');
        const set = new Set();
        el.querySelectorAll('.pill.active:not([data-value="__all__"])').forEach(p => {
          p.dataset.value.split(',').forEach(v => set.add(v));
        });
        activeFilters[filterKey] = set;
        if (set.size === 0) allBtn.classList.add('active');
      }
      render();
    });
  });
}

function buildFilters() {
  const types = [...new Set(INTELLIGENCE_DATA.issues.map(i => i.type))];
  buildFilterGroup('typeFilters', types.map(t => ({ label: t === 'Feature Request' ? 'FR' : t, value: t })), 'types');

  const statuses = [...new Set(INTELLIGENCE_DATA.issues.map(i => i.status))].sort((a, b) => {
    const ca = INTELLIGENCE_DATA.issues.filter(i => i.status === a).length;
    const cb = INTELLIGENCE_DATA.issues.filter(i => i.status === b).length;
    return cb - ca;
  });
  buildFilterGroup('statusFilters', statuses, 'statuses');

  const priorities = PRIO_ORDER.filter(p => INTELLIGENCE_DATA.issues.some(i => i.priority === p));
  buildFilterGroup('priorityFilters', priorities, 'priorities', {
    compounds: priorities.includes('P0') && priorities.includes('P1') ? [{ label: 'P0-P1', value: 'P0,P1' }] : []
  });

  const themes = [...new Set(INTELLIGENCE_DATA.issues.map(i => i.theme))].sort();
  const sel = document.getElementById('themeFilter');
  sel.innerHTML = '<option value="all">All Themes</option>' + themes.map(t => '<option value="' + t + '">' + t + '</option>').join('');
  sel.addEventListener('change', () => { activeFilters.theme = sel.value; render(); });

  document.getElementById('searchInput').addEventListener('input', e => {
    activeFilters.search = e.target.value;
    render();
  });

  // Clear callout filter
  document.getElementById('clearCalloutFilter').addEventListener('click', () => {
    calloutFilter = null;
    document.getElementById('clearCalloutFilter').style.display = 'none';
    // Reset callout opacity
    document.querySelectorAll('.callout').forEach(c => c.style.opacity = '');
    // Restore default status filter (non-resolved)
    const defaults = new Set(INTELLIGENCE_DATA.issues.map(i => i.status).filter(s => !RESOLVED_STATUSES.has(s)));
    activeFilters.statuses = defaults;
    // Update status pills
    document.querySelectorAll('#statusFilters .pill').forEach(p => {
      p.classList.remove('active');
      if (defaults.has(p.dataset.value)) p.classList.add('active');
    });
    render();
  });
}

// ── THEME SECTIONS ──
function renderThemes(filtered) {
  const grouped = {};
  filtered.forEach(i => { (grouped[i.theme] = grouped[i.theme] || []).push(i); });
  const sortedThemes = Object.entries(grouped).sort((a, b) => b[1].length - a[1].length);

  if (sortedThemes.length === 0) {
    document.getElementById('themeSections').innerHTML = '<div class="empty-state">No issues match the current filters.</div>';
    return;
  }

  document.getElementById('themeSections').innerHTML = sortedThemes.map(([theme, issues], idx) => {
    const prioCounts = countBy(issues, i => i.priority);
    const badges = PRIO_ORDER.filter(p => prioCounts[p]).map(p =>
      '<span class="mini-badge ' + p.toLowerCase() + '">' + p + ':' + prioCounts[p] + '</span>').join('');

    const rows = issues.map(i => {
      const sc = statusColor(i.status);
      const tc = i.type === 'Bug' ? 'bug' : 'feature';
      const assignee = i.assignee
        ? '<span class="assignee">' + i.assignee + '</span>'
        : '<span class="assignee unassigned">&mdash;</span>';

      // Last activity column
      const feCount = i.comments?.fe_update_count || 0;
      const feBadge = feCount > 0 ? `<span class="fe-badge">SE:${feCount}</span>` : '';
      let activityHtml;
      if (!i.comments || i.comments.comment_count === 0) {
        activityHtml = '<span class="activity-cell never">No comments</span>';
      } else if (!i.comments.last_eng_comment_date) {
        activityHtml = `<span class="activity-cell stale">SE only</span>${feBadge}`;
      } else {
        const days = daysAgo(i.comments.last_eng_comment_date);
        const cls = days > VERY_STALE_DAYS ? 'stale' : days > STALE_DAYS ? 'aging' : 'recent';
        activityHtml = `<span class="activity-cell ${cls}">${days}d ago</span>${feBadge}`;
      }

      return '<tr>' +
        '<td><a class="issue-key" href="' + (i.url || '#') + '" target="_blank" rel="noopener">' + i.key + '</a></td>' +
        '<td><span class="issue-summary">' + i.summary + '</span></td>' +
        '<td><span class="type-badge ' + tc + '">' + (i.type === 'Feature Request' ? 'FR' : i.type) + '</span></td>' +
        '<td><span class="priority-badge ' + i.priority.toLowerCase() + '">' + i.priority + '</span></td>' +
        '<td><span class="status-badge" style="background:color-mix(in srgb,' + sc + ' 12%,transparent);color:' + sc + '">' + i.status + '</span></td>' +
        '<td>' + activityHtml + '</td>' +
        '<td>' + assignee + '</td>' +
        '</tr>';
    }).join('');

    return '<div class="theme-section collapsed animate-in" style="animation-delay:' + (180 + idx * 60) + 'ms">' +
      '<div class="theme-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
        '<span class="theme-arrow">&#9662;</span>' +
        '<span class="theme-name">' + theme + '</span>' +
        '<span class="theme-count">' + issues.length + '</span>' +
        '<div class="theme-badges">' + badges + '</div>' +
      '</div>' +
      '<div class="theme-body"><div class="theme-body-inner">' +
        '<table class="issue-table">' +
          '<thead><tr><th>Key</th><th>Summary</th><th>Type</th><th>Priority</th><th>Status</th><th>Last Activity</th><th>Assignee</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div></div>' +
    '</div>';
  }).join('');
}
