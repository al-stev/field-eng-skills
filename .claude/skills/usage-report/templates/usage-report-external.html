/* ── DESIGN TOKENS (dark mode default) ── */
:root {

  --bg-elevated: #141820;
  --bg-surface: #1a1f2b;
  --bg-hover: #222838;
  --border: #2a3040;
  --border-subtle: #1e2430;
  --text-primary: #e8eaed;
  --text-secondary: #8b92a0;
  --text-tertiary: #5c6370;
  --accent: #d4a853;
  --accent-dim: rgba(212, 168, 83, 0.12);
  --accent-border: rgba(212, 168, 83, 0.25);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.10);
  --green-border: rgba(74, 222, 128, 0.22);
  --blue: #60a5fa;
  --blue-dim: rgba(96, 165, 250, 0.10);
  --blue-border: rgba(96, 165, 250, 0.22);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.10);
  --amber-border: rgba(251, 191, 36, 0.22);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.10);
  --red-border: rgba(248, 113, 113, 0.22);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 6px;
  --noise-opacity: 0.025;
  --mode: dark;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f6f4f0;
    --bg-elevated: #ffffff;
    --bg-surface: #eeece8;
    --bg-hover: #e6e4e0;
    --border: #d4d2ce;
    --border-subtle: #e0ded9;
    --text-primary: #1a1a1a;
    --text-secondary: #5c5c5c;
    --text-tertiary: #8c8c8c;
    --accent: #b8922e;
    --accent-dim: rgba(184, 146, 46, 0.10);
    --accent-border: rgba(184, 146, 46, 0.25);
    --green: #1a7a4c;
    --green-dim: rgba(26, 122, 76, 0.08);
    --green-border: rgba(26, 122, 76, 0.20);
    --blue: #1565a0;
    --blue-dim: rgba(96, 165, 250, 0.08);
    --blue-border: rgba(21, 101, 160, 0.20);
    --amber: #9a6e08;
    --amber-dim: rgba(154, 110, 8, 0.08);
    --amber-border: rgba(154, 110, 8, 0.20);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --red-border: rgba(220, 38, 38, 0.20);
    --noise-opacity: 0;
    --mode: light;
  }
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── BASE ── */
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── NOISE TEXTURE (dark mode only via opacity token) ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: var(--noise-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 9999;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── CONTAINER ── */
.container {
  max-width: 1160px;
  margin: 0 auto;
  padding: clamp(48px, 6vw, 80px) clamp(16px, 3vw, 32px) clamp(32px, 4vw, 64px);
}

/* ── HEADER ── */
.header {
  margin-bottom: clamp(32px, 4vw, 48px);
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.header-brand svg {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}

.header-brand-text {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.header-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
}

.header-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  line-height: 1.1;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.header-rule {
  width: 64px;
  height: 2px;
  background: var(--accent);
  border: none;
  margin-bottom: 12px;
}

.header-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
}

/* ── SECTION ── */
.section {
  margin-bottom: clamp(24px, 3vw, 40px);
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.4s ease-out forwards;
}

.section:nth-child(2) { animation-delay: 0.05s; }
.section:nth-child(3) { animation-delay: 0.10s; }
.section:nth-child(4) { animation-delay: 0.15s; }
.section:nth-child(5) { animation-delay: 0.20s; }
.section:nth-child(6) { animation-delay: 0.25s; }
.section:nth-child(7) { animation-delay: 0.30s; }
.section:nth-child(8) { animation-delay: 0.35s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .section {
    opacity: 1;
    transform: none;
    animation: none;
  }
}

.section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
}

/* ── KPI ROW ── */
.kpi-row {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(24px, 4vw, 48px);
  margin-bottom: 8px;
}

.kpi-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.kpi-value {
  font-family: var(--font-body);
  font-size: clamp(24px, 3vw, 32px);
  font-weight: 600;
  line-height: 1.1;
  color: var(--text-primary);
}

.kpi-value.zone-healthy { color: var(--green); }
.kpi-value.zone-at-risk { color: var(--amber); }
.kpi-value.zone-critical { color: var(--red); }

.kpi-unit {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
}

.kpi-trend {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  margin-top: 2px;
}

.kpi-trend.trend-up { color: var(--green); }
.kpi-trend.trend-down { color: var(--red); }
.kpi-trend.trend-stable { color: var(--text-tertiary); }

/* ── CHART CONTAINERS ── */
.chart-container {
  width: 100%;
  background: transparent;
  border-radius: var(--radius);
}

.chart-supplementary {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-tertiary);
  margin-top: 12px;
}

.chart-supplementary strong {
  font-weight: 600;
  color: var(--text-secondary);
}

/* ── AI NARRATIVE ── */
.narrative-section {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: clamp(24px, 3vw, 32px);
}

.narrative-text {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  line-height: 1.55;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.narrative-text:last-child {
  margin-bottom: 0;
}

.narrative-list {
  list-style: none;
  padding: 0;
  margin: 0 0 16px 0;
}

.narrative-list:last-child {
  margin-bottom: 0;
}

.narrative-list li {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  line-height: 1.55;
  color: var(--text-secondary);
  padding: 4px 0;
  padding-left: 16px;
  position: relative;
}

.narrative-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.narrative-list.numbered {
  counter-reset: narrative;
}

.narrative-list.numbered li {
  padding-left: 24px;
}

.narrative-list.numbered li::before {
  content: counter(narrative);
  counter-increment: narrative;
  width: auto;
  height: auto;
  border-radius: 0;
  background: none;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  top: 5px;
}

.narrative-sublabel {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  margin: 24px 0 12px 0;
}

.narrative-sublabel:first-child {
  margin-top: 0;
}

/* ── EMPTY STATE ── */
.empty-state {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-tertiary);
  padding: clamp(24px, 3vw, 48px) 0;
  text-align: center;
}

/* ── FOOTER ── */
.footer {
  margin-top: clamp(32px, 4vw, 64px);
  padding-top: 16px;
  border-top: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
  text-align: center;
}
</style>

/* ── DETECT COLOR MODE ── */
function isDarkMode() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
}

/* ── ECHARTS THEME REGISTRATION ── */
function getThemeColors() {
  const dark = isDarkMode();
  return {
    bg: 'transparent',
    textPrimary: dark ? '#e8eaed' : '#1a1a1a',
    textSecondary: dark ? '#8b92a0' : '#5c5c5c',
    textTertiary: dark ? '#5c6370' : '#8c8c8c',
    accent: dark ? '#d4a853' : '#b8922e',
    blue: dark ? '#60a5fa' : '#1565a0',
    green: dark ? '#4ade80' : '#1a7a4c',
    amber: dark ? '#fbbf24' : '#9a6e08',
    red: dark ? '#f87171' : '#dc2626',
    borderSubtle: dark ? '#1e2430' : '#e0ded9',
    bgElevated: dark ? '#141820' : '#ffffff',
    bgSurface: dark ? '#1a1f2b' : '#eeece8'
  };
}

/* ── UTILITY FUNCTIONS ── */
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function formatWeekLabel(weekStr) {
  const d = new Date(weekStr + 'T00:00:00');
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function formatMonthLabel(monthStr) {
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const parts = monthStr.split('-');
  return months[parseInt(parts[1]) - 1] + ' ' + parts[0].slice(2);
}

function getZoneClass(zone) {
  if (zone === 'healthy') return 'zone-healthy';
  if (zone === 'at_risk') return 'zone-at-risk';
  return 'zone-critical';
}

function getZoneLabel(zone) {
  if (zone === 'healthy') return 'Healthy';
  if (zone === 'at_risk') return 'At Risk';
  return 'Critical';
}

function getTrendArrow(value) {
  if (value === null || value === undefined) return null;
  if (value > 0) return { arrow: '\u2191', cls: 'trend-up', text: '+' + value.toFixed(1) + '%' };
  if (value < 0) return { arrow: '\u2193', cls: 'trend-down', text: value.toFixed(1) + '%' };
  return { arrow: '\u2014', cls: 'trend-stable', text: '0%' };
}

function numberWithCommas(x) {
  if (x === null || x === undefined) return 'N/A';
  return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

        const p = params[0];
        return '<div style="font-family: \'JetBrains Mono\', monospace; font-size: 11px; color: ' + c.textTertiary + ';">' + p.axisValue + '</div>' +
          '<div style="margin-top: 4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + c.blue + ';margin-right:6px;"></span>Tracked: <strong>' + p.value + 'h</strong></div>';
      }
    },
    series: [{
      type: 'bar',
      data: values,
      barWidth: '60%',
      itemStyle: {
        color: c.blue,
        borderRadius: [3, 3, 0, 0]
      },
      emphasis: {
        itemStyle: { color: c.blue + 'dd' }
      }
    }]
  });

  window.addEventListener('resize', function() { chart.resize(); });
  return chart;
}

function renderNarrative() {
  if (!AI_NARRATIVE || !AI_NARRATIVE.executive_summary) return '';

  const n = AI_NARRATIVE;
  let html = '<div class="section"><div class="narrative-section">';

  /* Executive Summary */
  html += '<div class="narrative-sublabel">Executive Summary</div>';
  const paragraphs = n.executive_summary.split('\n').filter(p => p.trim());
  paragraphs.forEach(function(p) {
    html += '<div class="narrative-text">' + p + '</div>';
  });

  /* Highlights */
  if (n.highlights && n.highlights.length > 0) {
    html += '<div class="narrative-sublabel">Key Highlights</div>';
    html += '<ul class="narrative-list">';
    n.highlights.forEach(function(h) {
      html += '<li>' + h + '</li>';
    });
    html += '</ul>';
  }

  /* Recommendations */
  if (n.recommendations && n.recommendations.length > 0) {
    html += '<div class="narrative-sublabel">Recommendations</div>';
    html += '<ol class="narrative-list numbered">';
    n.recommendations.forEach(function(r) {
      html += '<li>' + r + '</li>';
    });
    html += '</ol>';
  }

  html += '</div></div>';
  return html;
}

function renderFooter() {
  return `
    <div class="footer">
      Weights & Biases &middot; Usage Intelligence
    </div>
  `;
}

function renderEmptyState(reason) {
  let message = '';
  if (reason === 'config_error') {
    message = 'Customer not configured for BigQuery access. Add sfdc_account_id to templates/customers.yaml and retry.';
  } else if (reason === 'no_data') {
    message = 'No usage data found for ' + USAGE_DATA.customer + '. Verify the sfdc_account_id in templates/customers.yaml matches the Salesforce account.';
  } else if (reason === 'api_error') {
    message = 'BigQuery data unavailable -- check ADC credentials with /bigquery-setup';
  } else {
    message = 'No usage data available.';
  }

  return `
    <div class="section">
      <div class="section-label">Usage Report</div>
      <div class="empty-state">${message}</div>
    </div>
  `;
}

/* ── MAIN RENDER ── */
function render() {
  registerWandbTheme();

  const app = document.getElementById('app');
  let html = renderHeader();

  if (!USAGE_DATA.available) {
    html += renderEmptyState(USAGE_DATA.reason || 'no_data');
  } else {
    html += renderKPIRow();
    html += renderSeatChart();
    html += renderRadarChart();
    html += renderWeaveChart();
    html += renderTrackedHoursChart();
    html += renderNarrative();
  }

  html += renderFooter();
  app.innerHTML = html;

  /* Initialize ECharts after DOM is ready */
  if (USAGE_DATA.available) {
    requestAnimationFrame(function() {
      initSeatChart();
      initRadarChart();
      initWeaveChart();
      initTrackedHoursChart();
    });
  }
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', render);

/* ── THEME CHANGE LISTENER ── */
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    render();
  });
}
</script>
</body>
</html>
