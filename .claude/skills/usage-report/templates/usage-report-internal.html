<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Report — Internal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
/* ── DESIGN TOKENS (dark mode default) ── */
:root {
  --bg-primary: #0c0f14;
  --bg-elevated: #141820;
  --bg-surface: #1a1f2b;
  --bg-hover: #222838;
  --border: #2a3040;
  --border-subtle: #1e2430;
  --text-primary: #e8eaed;
  --text-secondary: #8b92a0;
  --text-tertiary: #5c6370;
  --accent: #d4a853;
  --accent-dim: rgba(212, 168, 83, 0.12);
  --accent-border: rgba(212, 168, 83, 0.25);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.10);
  --green-border: rgba(74, 222, 128, 0.22);
  --blue: #60a5fa;
  --blue-dim: rgba(96, 165, 250, 0.10);
  --blue-border: rgba(96, 165, 250, 0.22);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.10);
  --amber-border: rgba(251, 191, 36, 0.22);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.10);
  --red-border: rgba(248, 113, 113, 0.22);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 6px;
  --noise-opacity: 0.025;
  --scheme: dark;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f6f4f0;
    --bg-elevated: #ffffff;
    --bg-surface: #eeece8;
    --bg-hover: #e6e4e0;
    --border: #d4d2ce;
    --border-subtle: #e0ded9;
    --text-primary: #1a1a1a;
    --text-secondary: #5c5c5c;
    --text-tertiary: #8c8c8c;
    --accent: #b8922e;
    --accent-dim: rgba(184, 146, 46, 0.10);
    --accent-border: rgba(184, 146, 46, 0.25);
    --green: #1a7a4c;
    --green-dim: rgba(26, 122, 76, 0.08);
    --green-border: rgba(26, 122, 76, 0.20);
    --blue: #1565a0;
    --blue-dim: rgba(96, 165, 250, 0.08);
    --blue-border: rgba(21, 101, 160, 0.20);
    --amber: #9a6e08;
    --amber-dim: rgba(154, 110, 8, 0.08);
    --amber-border: rgba(154, 110, 8, 0.20);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --red-border: rgba(220, 38, 38, 0.20);
    --noise-opacity: 0;
    --scheme: light;
  }
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── BASE ── */
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── NOISE TEXTURE (dark mode only via opacity token) ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: var(--noise-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 9999;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ── LAYOUT ── */
.container {
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 clamp(16px, 3vw, 32px);
}

/* ── HEADER ── */
.header {
  padding: clamp(32px, 5vw, 56px) 0 clamp(20px, 3vw, 32px);
}

.header-subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.internal-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--red);
  background: var(--red-dim);
  border: 1px solid var(--red-border);
}

.header h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}

.header-rule {
  width: 64px;
  height: 2px;
  background: var(--accent);
  margin: 12px 0 20px;
}

.header-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

/* ── KPI ROW ── */
.kpi-row {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(24px, 4vw, 48px);
  padding: clamp(16px, 2vw, 24px) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.kpi-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.kpi-value {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.kpi-value .zone-pct {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
}

.kpi-trend {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
}

.trend-up { color: var(--green); }
.trend-down { color: var(--red); }
.trend-stable { color: var(--text-tertiary); }

/* ── SECTION LAYOUT ── */
.usage-section {
  padding: clamp(24px, 3vw, 40px) 0;
  border-bottom: 1px solid var(--border-subtle);
}

.usage-section:last-of-type {
  border-bottom: none;
}

.section-header {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.section-headline {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 16px;
}

.section-headline .pct {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
}

.section-headline .zone-label {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
}

.section-headline .headline-value {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.supplementary-stat {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-tertiary);
  margin-top: 12px;
}

/* ── ECHARTS CONTAINERS ── */
.echart-container {
  width: 100%;
  height: 400px;
  min-height: 200px;
}

.echart-container.tall {
  height: 600px;
}

.echart-container.radar-chart {
  height: 380px;
}

/* ── ACCOUNT HEALTH GRID ── */
.health-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(16px, 2vw, 24px);
}

@media (max-width: 600px) {
  .health-grid {
    grid-template-columns: 1fr;
  }
}

.health-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.health-field-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
}

.health-field-value {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.health-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

/* ── POWER USER TABLE ── */
.power-user-table {
  width: 100%;
  border-collapse: collapse;
  overflow-x: auto;
  display: block;
}

.power-user-table thead,
.power-user-table tbody {
  display: table;
  width: 100%;
  table-layout: fixed;
}

.power-user-table th {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  text-align: left;
  padding: 8px 8px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.power-user-table td {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  padding: 10px 8px;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}

.power-user-table tr:nth-child(even) td {
  background: var(--bg-surface);
}

.power-user-table tr:hover td {
  background: var(--bg-hover);
  transition: background 0.15s ease-out;
}

.power-user-rank {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  width: 36px;
}

.power-user-name {
  font-weight: 600;
}

.power-user-email {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  display: block;
  margin-top: 2px;
}

.power-user-events {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.product-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  background: var(--blue-dim);
  border: 1px solid var(--blue-border);
  color: var(--blue);
  margin: 1px 3px 1px 0;
  white-space: nowrap;
}

.activity-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

.activity-dot.active { background: var(--green); }
.activity-dot.recent { background: var(--amber); }
.activity-dot.stale { background: var(--red); }

@media (max-width: 768px) {
  .power-user-table {
    font-size: 12px;
  }
  .power-user-table th,
  .power-user-table td {
    padding: 6px 4px;
  }
}

/* ── AI NARRATIVE ── */
.ai-summary-text {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  line-height: 1.65;
  color: var(--text-primary);
  padding: clamp(16px, 2vw, 24px);
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  margin-bottom: 16px;
}

.ai-highlights {
  list-style: none;
  padding: 0;
}

.ai-highlights li {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  padding: 6px 0;
  padding-left: 16px;
  position: relative;
}

.ai-highlights li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 13px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

.ai-recommendations {
  list-style: none;
  padding: 0;
  counter-reset: rec;
}

.ai-recommendations li {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  padding: 6px 0 6px 28px;
  position: relative;
}

.ai-recommendations li::before {
  counter-increment: rec;
  content: counter(rec);
  position: absolute;
  left: 0;
  top: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
}

/* ── RISK SIGNALS ── */
.risk-signals-list {
  list-style: none;
  padding: 0;
  border-left: 3px solid var(--red);
  padding-left: 16px;
  background: var(--red-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding-top: 12px;
  padding-bottom: 12px;
  padding-right: 16px;
}

.risk-signals-list li {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  padding: 4px 0;
  padding-left: 16px;
  position: relative;
}

.risk-signals-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 11px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--red);
}

/* ── SE ACTIONS ── */
.se-actions-list {
  list-style: none;
  padding: 0;
  border-left: 3px solid var(--amber);
  padding-left: 16px;
  background: var(--amber-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding-top: 12px;
  padding-bottom: 12px;
  padding-right: 16px;
  counter-reset: se-action;
}

.se-actions-list li {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  padding: 4px 0 4px 28px;
  position: relative;
}

.se-actions-list li::before {
  counter-increment: se-action;
  content: counter(se-action);
  position: absolute;
  left: 0;
  top: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--amber);
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: var(--amber-dim);
  border: 1px solid var(--amber-border);
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: clamp(24px, 4vw, 48px) 0;
  text-align: center;
}

.empty-state h2 {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  margin-bottom: 16px;
}

.empty-state p {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-tertiary);
  max-width: 500px;
  margin: 0 auto;
}

/* ── FOOTER ── */
.footer {
  padding: clamp(24px, 3vw, 40px) 0;
}

.footer-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

/* ── INTERNAL-ONLY ── */
/* Account health, power users, risk/actions sections hidden when viewed in external context */

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in { animation: fadeUp 0.4s ease-out both; }

@media (prefers-reduced-motion: reduce) {
  .animate-in { animation: none; }
}
</style>
</head>

<div class="container">

  <!-- Header -->
  <header class="header animate-in" id="reportHeader">
    <!-- Rendered by JS -->
  </header>

  <!-- KPI Overview Row -->
  <section class="kpi-row animate-in" style="animation-delay: 50ms" id="kpiRow">
    <!-- Rendered by JS -->
  </section>

  <!-- Seat Utilization Chart (ECharts) -->
  <section class="usage-section animate-in" style="animation-delay: 100ms" id="seatSection">
    <div class="section-header">SEAT UTILIZATION</div>
    <div class="section-headline" id="seatHeadline"></div>
    <div id="seatChart" class="echart-container tall"></div>
  </section>

  <!-- Product Adoption Radar (ECharts) -->
  <section class="usage-section animate-in" style="animation-delay: 150ms" id="radarSection">
    <div class="section-header">PRODUCT ADOPTION</div>
    <div id="radarChart" class="echart-container radar-chart"></div>
  </section>

  <!-- Product-Area Adoption Over Time (ECharts) -->
  <section class="usage-section animate-in" style="animation-delay: 175ms" id="paTrendSection">
    <div class="section-header">PRODUCT-AREA ADOPTION OVER TIME</div>
    <div id="paTrendChart" class="echart-container" style="height: 360px;"></div>
  </section>

  <!-- Weave Activity (active-but-unpaid; ECharts + table, rendered by JS) -->
  <section class="usage-section animate-in" style="animation-delay: 185ms" id="weaveActivitySection">
    <div class="section-header">WEAVE ACTIVITY</div>
    <div id="weaveActivityHeadline"></div>
    <div id="weaveActivityKpis" class="kpi-row" style="border-bottom:none"></div>
    <div id="weaveActivityChart" class="echart-container" style="height: 320px;"></div>
    <div id="weaveActivityUsers"></div>
    <div id="weaveActivityCallout"></div>
  </section>

  <!-- Weave Ingestion Chart (ECharts) -->
  <section class="usage-section animate-in" style="animation-delay: 200ms" id="weaveSection">
    <div class="section-header">WEAVE INGESTION</div>
    <div class="section-headline" id="weaveHeadline"></div>
    <div id="weaveChart" class="echart-container"></div>
    <div class="supplementary-stat" id="weaveStat"></div>
  </section>

  <!-- Tracked Hours Chart (ECharts) -->
  <section class="usage-section animate-in" style="animation-delay: 250ms" id="hoursSection">
    <div class="section-header">TRACKED HOURS</div>
    <div class="section-headline" id="hoursHeadline"></div>
    <div id="hoursChart" class="echart-container"></div>
    <div class="supplementary-stat" id="hoursStat"></div>
  </section>

  <!-- AI Executive Summary (candid internal tone) -->
  <section class="usage-section animate-in" style="animation-delay: 300ms" id="aiSummarySection">
    <!-- Rendered by JS -->
  </section>

  <!-- Power User Map (internal-only) -->
  <section class="usage-section internal-only animate-in" style="animation-delay: 350ms" id="powerUserSection">
    <!-- Rendered by JS -->
  </section>

  <!-- Account Health Grid (internal-only) -->
  <section class="usage-section internal-only animate-in" style="animation-delay: 400ms" id="healthSection">
    <!-- Rendered by JS -->
  </section>

  <!-- Risk Signals & SE Actions (internal-only) -->
  <section class="usage-section internal-only animate-in" style="animation-delay: 450ms" id="riskActionsSection">
    <!-- Rendered by JS -->
  </section>

  <!-- Footer -->
  <footer class="footer animate-in" style="animation-delay: 500ms" id="reportFooter">
    <!-- Rendered by JS -->
  </footer>

</div>

/* ── UTILITY FUNCTIONS ── */

function getComputedThemeColors() {
  const style = getComputedStyle(document.documentElement);
  return {
    blue: style.getPropertyValue('--blue').trim(),
    green: style.getPropertyValue('--green').trim(),
    amber: style.getPropertyValue('--amber').trim(),
    red: style.getPropertyValue('--red').trim(),
    accent: style.getPropertyValue('--accent').trim(),
    textPrimary: style.getPropertyValue('--text-primary').trim(),
    textSecondary: style.getPropertyValue('--text-secondary').trim(),
    textTertiary: style.getPropertyValue('--text-tertiary').trim(),
    bgSurface: style.getPropertyValue('--bg-surface').trim(),
    bgElevated: style.getPropertyValue('--bg-elevated').trim(),
    border: style.getPropertyValue('--border').trim(),
    borderSubtle: style.getPropertyValue('--border-subtle').trim()
  };
}

function classifyZone(percent) {
  if (percent >= 80) return 'healthy';
  if (percent >= 50) return 'at_risk';
  return 'critical';
}

function zoneColor(zone) {
  switch (zone) {
    case 'healthy': return 'var(--green)';
    case 'at_risk': return 'var(--amber)';
    case 'critical': return 'var(--red)';
    default: return 'var(--text-secondary)';
  }
}

function zoneColorRaw(zone, colors) {
  switch (zone) {
    case 'healthy': return colors.green;
    case 'at_risk': return colors.amber;
    case 'critical': return colors.red;
    default: return colors.textSecondary;
  }
}

function zoneLabel(zone) {
  switch (zone) {
    case 'healthy': return 'Healthy';
    case 'at_risk': return 'At Risk';
    case 'critical': return 'Critical';
    default: return '';
  }
}

function churnZoneColor(pct) {
  if (pct < 0.10) return 'var(--green)';
  if (pct <= 0.25) return 'var(--amber)';
  return 'var(--red)';
}

function formatTrend(change) {
  if (change == null) return '';
  const abs = Math.abs(change).toFixed(1);
  if (change > 0.5) {
    return '<span class="kpi-trend trend-up">\u2191 ' + abs + '% vs prior period</span>';
  } else if (change < -0.5) {
    return '<span class="kpi-trend trend-down">\u2193 ' + abs + '% vs prior period</span>';
  }
  return '<span class="kpi-trend trend-stable">\u2014 stable</span>';
}

function formatNumber(n) {
  if (n == null) return '\u2014';
  return n.toLocaleString('en-US');
}

function formatDate(isoDate) {
  if (!isoDate) return '\u2014';
  var d = new Date(isoDate + 'T00:00:00');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function formatWeekLabel(weekStr) {
  var d = new Date(weekStr + 'T00:00:00');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function formatMonthLabel(monthStr) {
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var parts = monthStr.split('-');
  return months[parseInt(parts[1], 10) - 1];
}

function healthDotColor(health) {
  switch ((health || '').toLowerCase()) {
    case 'green': return 'var(--green)';
    case 'yellow': return 'var(--amber)';
    case 'red': return 'var(--red)';
    default: return 'var(--text-tertiary)';
  }
}

function titleCase(str) {
  if (!str) return '\u2014';
  return str.replace(/[-_]/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function daysAgo(dateStr) {
  if (!dateStr) return null;
  var then = new Date(dateStr + 'T00:00:00');
  var now = new Date();
  return Math.floor((now - then) / (1000 * 60 * 60 * 24));
}

function activityClass(dateStr) {
  var days = daysAgo(dateStr);
  if (days == null) return 'stale';
  if (days <= 7) return 'active';
  if (days <= 30) return 'recent';
  return 'stale';
}

function activityLabel(dateStr) {
  var days = daysAgo(dateStr);
  if (days == null) return 'Unknown';
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  return days + 'd ago';
}

/* ── RENDER: KPI ROW ── */
function renderKPIRow(container, data) {
  if (!data.available) {
    container.style.display = 'none';
    return;
  }

  var html = '';
  var seat = data.seat_utilization;
  var weave = data.weave;
  var hours = data.tracked_hours;
  if (seat) {
    var zone = classifyZone(seat.utilization_percent);
    html += '<div class="kpi-item">' +
      '<span class="kpi-value">' + seat.active + ' / ' + seat.contracted + ' seats (<span class="zone-pct" style="color:' + zoneColor(zone) + '">' + seat.utilization_percent + '%</span>)</span>' +
    '</div>';
  }

  if (weave) {
    var wZone = classifyZone(weave.utilization_percent);
    html += '<div class="kpi-item">' +
      '<span class="kpi-value">' + Math.round(weave.ingestion_gb) + ' GB of ' + Math.round(weave.limit_gb) + ' GB (<span class="zone-pct" style="color:' + zoneColor(wZone) + '">' + weave.utilization_percent + '%</span>)</span>' +
    '</div>';
  }

  if (hours) {
    html += '<div class="kpi-item">' +
      '<span class="kpi-value">' + formatNumber(Math.round(hours.last_30d_hours)) + 'h compute last 30d</span>' +
    '</div>';
  }

  if (hours && hours.last_30d_run_count) {
    html += '<div class="kpi-item">' +
      '<span class="kpi-value">' + formatNumber(hours.last_30d_run_count) + ' runs last 30d</span>' +
    '</div>';
  }

  if (!html) {
    container.style.display = 'none';
    return;
  }
  container.innerHTML = html;
}

/* ── RENDER: SEAT UTILIZATION (ECharts) ── */
function renderSeatUtilizationChart(data) {
  var seat = data.seat_utilization;
  if (!seat || !seat.history || seat.history.length === 0) {
    document.getElementById('seatSection').style.display = 'none';
    return;
  }

  var colors = getComputedThemeColors();
  var zone = classifyZone(seat.utilization_percent);

  document.getElementById('seatHeadline').innerHTML =
    '<span class="pct" style="color:' + zoneColor(zone) + '">' + seat.utilization_percent + '%</span>' +
    '<span class="zone-label">' + zoneLabel(zone) + ' \u00b7 ' + seat.active + ' / ' + seat.contracted + ' seats</span>';

  var weeks = seat.history.map(function(h) { return formatWeekLabel(h.week); });
  var activeVals = seat.history.map(function(h) { return h.active; });
  var contractedVals = seat.history.map(function(h) { return h.contracted; });

  var chartDom = document.getElementById('seatChart');
  var chart = echarts.init(chartDom, 'wandb');

  chart.setOption({
    tooltip: {
      trigger: 'axis',

/* ── RENDER: PRODUCT-AREA ADOPTION OVER TIME (ECharts heatmap) ──
   Area x year heatmap. Each row is row-normalised (colour = share of that area's
   own peak year) so trajectory/drop-off reads regardless of absolute scale; the
   row label carries the all-time total so scale is not lost. Linear, no text on
   cells (exact values in tooltip) -- avoids the log-scale + low-contrast pitfalls
   of a stacked/overlapping bar. Reveals multi-year shifts (an area heavily used
   years ago that has dropped off). Reads product_areas[].monthly_events; window
   controlled by usage.py --months (pass 0 for full history). */
function renderProductAreaTrend(data) {
  var areas = (data.product_areas || []).filter(function(a) {
    return a.monthly_events && a.monthly_events.length > 0;
  });
  if (areas.length === 0) {
    var s = document.getElementById('paTrendSection');
    if (s) s.style.display = 'none';
    return;
  }
  var colors = getComputedThemeColors();
  // Models-capability heatmap: exclude the Weave sub-areas (Weave is a distinct
  // product, shown separately below) and Collaboration (profile views, low signal).
  // Rename "Model Registry" -> "Registry".
  function normName(n) {
    if (n === 'Model Registry') return 'Registry';
    if (n === 'Sweeps Created' || n === 'Sweeps Viewed') return 'Sweeps';
    return n;
  }
  function excluded(n) { return n === 'Collaboration' || String(n).indexOf('Weave') === 0; }
  // aggregate events per area per year
  var yearSet = {};
  var agg = {}; // area -> {year: events}
  areas.forEach(function(a) {
    if (excluded(a.area)) return;
    var nm = normName(a.area);
    if (!agg[nm]) agg[nm] = {};
    a.monthly_events.forEach(function(m) {
      var y = String(m.month).slice(0, 4);
      yearSet[y] = true;
      agg[nm][y] = (agg[nm][y] || 0) + m.count;
    });
  });
  // Always show Registry, even at zero -- the empty (dark) row makes the
  // governance gap visible rather than silently omitting it.
  if (!agg['Registry']) agg['Registry'] = {};
  // If the warehouse returned no year at all (e.g. only Registry, which is empty),
  // seed the current year so the heatmap still has a column to render.
  if (Object.keys(yearSet).length === 0) yearSet[String(new Date().getFullYear())] = true;
  var years = Object.keys(yearSet).sort();
  var totals = {};
  Object.keys(agg).forEach(function(nm) {
    totals[nm] = Object.keys(agg[nm]).reduce(function(s, y) { return s + agg[nm][y]; }, 0);
  });
  // The most recent year is usually partial (data through mid-year). Annualize it by
  // months-of-data present so its colour is comparable to full years; keep actual YTD
  // for the label/tooltip. Self-adjusting -- no hardcoded date.
  var latest = years[years.length - 1];
  var moSet = {};
  areas.forEach(function(a) {
    if (excluded(a.area)) return;
    a.monthly_events.forEach(function(m) { if (String(m.month).slice(0, 4) === latest) moSet[m.month] = true; });
  });
  var monthsPresent = Object.keys(moSet).length || 12;
  var partial = monthsPresent < 12;
  var factor = partial ? 12 / monthsPresent : 1;
  function adj(a, y) { var ev = agg[a][y] || 0; return y === latest ? ev * factor : ev; }
  // biggest area on top: sort desc, then reverse for y-index (0 = bottom).
  // Registry (total 0) sorts to the bottom and renders as the darkest row.
  var areasDesc = Object.keys(agg).sort(function(x, y) { return totals[y] - totals[x]; });
  var areasY = areasDesc.slice().reverse();
  var rows = areasY.map(function(a) { return a + '  ·  ' + totals[a].toLocaleString(); });
  var yearsLbl = years.map(function(y) { return (partial && y === latest) ? y + ' *' : y; });
  var cells = [];
  areasY.forEach(function(a, yi) {
    var rowmax = Math.max.apply(null, years.map(function(y) { return adj(a, y); })) || 1;
    years.forEach(function(y, xi) {
      var ev = agg[a][y] || 0;
      var cell = { value: [xi, yi, Math.round(adj(a, y) / rowmax * 1000) / 1000], abs: ev };
      if (partial && y === latest) cell.ann = Math.round(ev * factor);
      cells.push(cell);
    });
  });
  var chart = echarts.init(document.getElementById('paTrendChart'), 'wandb');
  chart.setOption({
    tooltip: { position: 'top', backgroundColor: colors.bgElevated, borderColor: colors.border,
      textStyle: { color: colors.textPrimary, fontSize: 12 },
      formatter: function(p) { var nm = p.name.split('  ·')[0], yr = yearsLbl[p.value[0]], ab = (p.data.abs || 0).toLocaleString();
        if (p.data.ann != null) return nm + ' — ' + yr.replace(' *', '') + ' YTD: <b>' + ab + '</b> events (~' + p.data.ann.toLocaleString() + ' annualized)';
        return nm + ' — ' + yr + ': <b>' + ab + '</b> events'; } },
    grid: { left: 178, right: 24, top: 16, bottom: 64 },
    xAxis: { type: 'category', data: yearsLbl, splitArea: { show: true }, axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { color: colors.textSecondary, fontFamily: "'JetBrains Mono', monospace" } },
    yAxis: { type: 'category', data: rows, splitArea: { show: true }, axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { color: colors.textSecondary, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 } },
    visualMap: { min: 0, max: 1, calculable: false, show: true, orient: 'horizontal', left: 'center', bottom: 8,
      text: ['peak year', 'none'], textStyle: { color: colors.textTertiary, fontFamily: "'JetBrains Mono', monospace", fontSize: 10 },
      inRange: { color: ['#101722', '#1d3350', '#2b5891', '#4a86d8', '#a8cdf0'] } },
    series: [{ type: 'heatmap', data: cells,
      itemStyle: { borderColor: colors.bgElevated, borderWidth: 3 },
      emphasis: { itemStyle: { shadowBlur: 8, shadowColor: 'rgba(0,0,0,.5)' } } }]
  });
  window.addEventListener('resize', function() { chart.resize(); });
}

/* ── RENDER: WEAVE ACTIVITY (active-but-unpaid; ECharts stacked bar + table) ──
   Consumes data.weave_activity ([{month, area, events, users}]) and
   data.weave_users ([{username, email, events, first_day, last_day}]). Mirrors the
   bespoke "Weave — active but unpaid" section: KPI row, monthly stacked bar by area
   (Tracing / Evaluation / Data / Other weave), and a real-identity "who's logging
   Weave traces" table. Hides the whole section gracefully if weave_activity is
   missing or empty. Internal report -- shows real emails / usernames. */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderWeaveActivity(data) {
  var section = document.getElementById('weaveActivitySection');
  var activity = data.weave_activity || [];
  if (!section) return;
  if (!activity.length) {
    section.style.display = 'none';
    return;
  }
  var colors = getComputedThemeColors();

  var WV_AREAS = ['Tracing', 'Evaluation', 'Data', 'Other weave'];
  var WV_COL = { 'Tracing': colors.blue, 'Evaluation': colors.accent, 'Data': '#a78bfa', 'Other weave': colors.textTertiary };

  // pivot activity -> months x area
  var monthSet = {};
  activity.forEach(function(r) { monthSet[r.month] = true; });
  var months = Object.keys(monthSet).sort();
  var moIdx = {};
  months.forEach(function(m, i) { moIdx[m] = i; });
  var pivot = {};
  WV_AREAS.forEach(function(a) { pivot[a] = months.map(function() { return 0; }); });
  var totalEvents = 0, tracingEvents = 0, evalEvents = 0;
  activity.forEach(function(r) {
    var ev = r.events || 0;
    totalEvents += ev;
    if (r.area === 'Tracing') tracingEvents += ev;
    if (r.area === 'Evaluation') evalEvents += ev;
    var a = (WV_AREAS.indexOf(r.area) >= 0) ? r.area : 'Other weave';
    pivot[a][moIdx[r.month]] += ev;
  });

  // users -- prefer explicit weave_users; fall back to unique users in activity
  var users = data.weave_users || [];
  var userCount = users.length;
  if (!userCount) {
    var uset = {};
    activity.forEach(function(r) { if (r.users != null) uset[r.month] = Math.max(uset[r.month] || 0, r.users); });
    // best-effort distinct-user estimate: peak monthly users
    userCount = Object.keys(uset).reduce(function(mx, k) { return Math.max(mx, uset[k]); }, 0);
  }

  var weaveCustomer = data.account_health && data.account_health.weave_customer;

  /* Intro line */
  var intro = 'Active Weave usage';
  if (!weaveCustomer) {
    intro = 'Sold Models-Only (<b>$0 Weave ARR</b>), yet a pocket of the team actively traces and evaluates LLM / agent apps on Weave — <b>' +
      formatNumber(totalEvents) + '</b> events from <b>' + userCount + '</b> users. Live expansion whitespace.';
  } else {
    intro = 'The team is tracing and evaluating LLM / agent apps on Weave — <b>' +
      formatNumber(totalEvents) + '</b> events from <b>' + userCount + '</b> users.';
  }
  document.getElementById('weaveActivityHeadline').innerHTML =
    '<p class="supplementary-stat" style="color:var(--text-secondary);margin-top:0;margin-bottom:16px">' + intro + '</p>';

  /* KPI row */
  function kpi(value, label) {
    return '<div class="kpi-item"><span class="kpi-value">' + value + ' ' + label + '</span></div>';
  }
  var kpiHtml =
    kpi(formatNumber(totalEvents), 'Weave events') +
    kpi(formatNumber(tracingEvents), 'traced') +
    kpi(formatNumber(evalEvents), 'evaluation events') +
    kpi(formatNumber(userCount), 'Weave users');
  if (!weaveCustomer) {
    kpiHtml += '<div class="kpi-item"><span class="kpi-value" style="color:var(--red)">$0 Weave ARR</span></div>';
  }
  document.getElementById('weaveActivityKpis').innerHTML = kpiHtml;

  /* Stacked bar chart */
  var chart = echarts.init(document.getElementById('weaveActivityChart'), 'wandb');
  chart.setOption({
    tooltip: { trigger: 'axis', backgroundColor: colors.bgElevated, borderColor: colors.border,
      textStyle: { color: colors.textPrimary, fontSize: 12, fontFamily: "'Outfit', sans-serif" } },
    legend: { data: WV_AREAS, textStyle: { color: colors.textSecondary }, top: 0 },
    grid: { left: 52, right: 20, top: 34, bottom: 30 },
    xAxis: { type: 'category', data: months.map(formatMonthLabel) },
    yAxis: { type: 'value', name: 'events', splitLine: { lineStyle: { color: colors.borderSubtle, type: 'dashed' } } },
    series: WV_AREAS.map(function(a) {
      return { name: a, type: 'bar', stack: 'weave', data: pivot[a], itemStyle: { color: WV_COL[a] } };
    })
  });
  window.addEventListener('resize', function() { chart.resize(); });

  /* "Who's logging Weave traces" table (real identities) */
  var sortedUsers = users.slice().sort(function(a, b) { return (b.events || 0) - (a.events || 0); });
  var tableHtml = '<div class="section-header" style="margin-top:20px">WHO’S LOGGING WEAVE TRACES</div>';
  tableHtml += '<div style="overflow-x:auto"><table class="power-user-table">';
  tableHtml += '<thead><tr><th>User</th><th style="text-align:right">Weave events</th><th>First seen</th><th>Last seen</th><th>Status</th></tr></thead><tbody>';
  sortedUsers.forEach(function(u) {
    var email = (u.email || '').trim();
    var nameCell;
    if (email && email.indexOf('@') >= 0) {
      nameCell = '<span class="power-user-name">' + escapeHtml(email) + '</span>';
    } else {
      var uname = String(u.username || '').slice(0, 8);
      nameCell = '<span style="color:var(--text-tertiary)">service / anon (' + escapeHtml(uname) + '…)</span>';
    }
    var last = u.last_day || '';
    var active = String(last) >= '2026-06-01';
    var statusDot = active ? 'active' : 'stale';
    var statusLabel = active ? 'active' : 'past';
    tableHtml += '<tr>' +
      '<td>' + nameCell + '</td>' +
      '<td style="text-align:right"><span class="power-user-events">' + formatNumber(u.events || 0) + '</span></td>' +
      '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">' + escapeHtml(u.first_day || '—') + '</span></td>' +
      '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">' + escapeHtml(last || '—') + '</span></td>' +
      '<td><span class="activity-dot ' + statusDot + '"></span>' + statusLabel + '</td>' +
    '</tr>';
  });
  tableHtml += '</tbody></table></div>';
  document.getElementById('weaveActivityUsers').innerHTML = sortedUsers.length ? tableHtml : '';

  /* Expansion callout naming the top-2 email champions */
  var named = sortedUsers.filter(function(u) { return u.email && u.email.indexOf('@') >= 0; });
  var champs = named.slice(0, 2).map(function(u) {
    return u.email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }).join(' & ') || 'their Weave users';
  var calloutHtml = '<div class="risk-signals-list" style="border-left-color:var(--green);background:var(--green-dim);margin-top:16px">' +
    '<li style="color:var(--text-primary)">Champions <b>' + escapeHtml(champs) + '</b> are actively logging Weave' +
    (weaveCustomer ? '.' : ' — a live expansion signal ahead of renewal. Land paid Weave on seats/platform.') +
    '</li></div>';
  document.getElementById('weaveActivityCallout').innerHTML = calloutHtml;
}

      '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">' + displayUsername + '</span></td>' +
      '<td style="text-align:right"><span class="power-user-events">' + formatNumber(user.total_events) + '</span></td>' +
      '<td>' + badges + '</td>' +
      '<td><span class="activity-dot ' + ac + '"></span>' + activityLabel(user.last_activity) + '</td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

/* ── RENDER: ACCOUNT HEALTH GRID ── */
function renderAccountHealth(container, data) {
  var health = data.account_health;
  if (!health) {
    container.style.display = 'none';
    return;
  }

  var html = '<div class="section-header">ACCOUNT HEALTH</div>';
  html += '<div class="health-grid">';

  /* Row 1: Renewal + CS Tier */
  html += '<div class="health-field">' +
    '<span class="health-field-label">RENEWAL</span>' +
    '<span class="health-field-value">' + formatDate(health.renewal_date) + '</span>' +
  '</div>';
  html += '<div class="health-field">' +
    '<span class="health-field-label">CS TIER</span>' +
    '<span class="health-field-value">' + titleCase(health.cs_tier) + '</span>' +
  '</div>';

  /* Row 2: ARR + Health */
  html += '<div class="health-field">' +
    '<span class="health-field-label">ARR</span>' +
    '<span class="health-field-value">$' + formatNumber(Math.round(health.arr)) + '</span>' +
  '</div>';

  var dotColor = healthDotColor(health.customer_health);
  html += '<div class="health-field">' +
    '<span class="health-field-label">HEALTH</span>' +
    '<span class="health-field-value"><span class="health-dot" style="background:' + dotColor + '"></span>' + titleCase(health.customer_health) + '</span>' +
  '</div>';

  /* Row 3: Plan + Deployment */
  html += '<div class="health-field">' +
    '<span class="health-field-label">PLAN</span>' +
    '<span class="health-field-value">' + titleCase(health.subscription_plan) + '</span>' +
  '</div>';
  html += '<div class="health-field">' +
    '<span class="health-field-label">DEPLOYMENT</span>' +
    '<span class="health-field-value">' + titleCase(health.deployment_type) + '</span>' +
  '</div>';

  /* Row 4: Churn Risk (full width) */
  if (health.churn_probability_3mo != null || health.churn_probability_5mo != null) {
    var p3 = health.churn_probability_3mo != null ? (health.churn_probability_3mo * 100).toFixed(0) : '\u2014';
    var p5 = health.churn_probability_5mo != null ? (health.churn_probability_5mo * 100).toFixed(0) : '\u2014';
    var maxChurn = Math.max(health.churn_probability_3mo || 0, health.churn_probability_5mo || 0);
    var churnColor = churnZoneColor(maxChurn);
    html += '<div class="health-field" style="grid-column: 1 / -1">' +
      '<span class="health-field-label">CHURN RISK</span>' +
      '<span class="health-field-value" style="color:' + churnColor + '">' + p3 + '% (3mo) / ' + p5 + '% (5mo)</span>' +
    '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

/* ── RENDER: RISK SIGNALS & SE ACTIONS ── */
function renderRiskActions(container, narrative) {
  if (!narrative) {
    container.style.display = 'none';
    return;
  }

  var hasRisks = narrative.risk_signals && narrative.risk_signals.length > 0;
  var hasActions = narrative.se_actions && narrative.se_actions.length > 0;

  if (!hasRisks && !hasActions) {
    container.style.display = 'none';
    return;
  }

  var html = '';

  if (hasRisks) {
    html += '<div class="section-header">RISK SIGNALS</div>';
    html += '<ul class="risk-signals-list">';
    narrative.risk_signals.forEach(function(r) {
      html += '<li>' + r + '</li>';
    });
    html += '</ul>';
  }

  if (hasActions) {
    html += '<div class="section-header" style="margin-top:' + (hasRisks ? '24px' : '0') + '">SE ACTIONS</div>';
    html += '<ol class="se-actions-list">';
    narrative.se_actions.forEach(function(a) {
      html += '<li>' + a + '</li>';
    });
    html += '</ol>';
  }

  container.innerHTML = html;
}

/* ── RENDER: FOOTER ── */
function renderFooter(container, data) {
  container.innerHTML = '<span class="footer-text">Generated ' + formatDate(data.generated) + ' \u00b7 W&B Usage Report (Internal) \u00b7 Not for customer distribution</span>';
}

/* ── RENDER: EMPTY STATE ── */
function renderEmptyState(data) {
  renderHeader(document.getElementById('reportHeader'), data);

  /* Hide all data sections */
  ['kpiRow', 'seatSection', 'radarSection', 'paTrendSection', 'weaveActivitySection', 'weaveSection', 'hoursSection', 'aiSummarySection', 'powerUserSection', 'healthSection', 'riskActionsSection'].forEach(function(id) {
    document.getElementById(id).style.display = 'none';
  });

  /* Show empty state message */
  var emptyDiv = document.createElement('section');
  emptyDiv.className = 'empty-state animate-in';
  emptyDiv.style.animationDelay = '100ms';

  var message = '';
  var reason = data.reason || 'unknown';
  if (reason === 'config_error') {
    message = 'Customer not configured for BigQuery access. Add sfdc_account_id to templates/customers.yaml and retry.';
  } else if (reason === 'no_data') {
    message = 'No usage data found for ' + data.customer + '. Verify the sfdc_account_id in templates/customers.yaml matches the Salesforce account.';
  } else if (reason === 'api_error') {
    message = 'BigQuery data unavailable \u2014 check ADC credentials with /bigquery-setup';
  } else {
    message = 'No usage data available for ' + data.customer + '.';
  }

  emptyDiv.innerHTML = '<h2>Usage Report</h2><p>' + message + '</p>';
  var containerEl = document.querySelector('.container');
  var footer = document.getElementById('reportFooter');
  containerEl.insertBefore(emptyDiv, footer);
}

/* ── MAIN RENDER ── */
function render() {
  var data = USAGE_DATA;
  var narrative = (typeof AI_NARRATIVE !== 'undefined') ? AI_NARRATIVE : null;

  /* Footer always renders */
  renderFooter(document.getElementById('reportFooter'), data);

  /* Empty / unavailable state */
  if (!data.available) {
    renderEmptyState(data);
    return;
  }

  /* Header */
  renderHeader(document.getElementById('reportHeader'), data);

  /* KPI overview row */
  renderKPIRow(document.getElementById('kpiRow'), data);

  /* ECharts sections -- each independently omits when data is absent */
  renderSeatUtilizationChart(data);
  renderProductRadar(data);
  renderProductAreaTrend(data);
  renderWeaveActivity(data);
  renderWeaveIngestionChart(data);
  renderTrackedHoursChart(data);

  /* AI Executive Summary (candid internal tone) */
  renderAISummary(document.getElementById('aiSummarySection'), narrative);

  /* Internal-only sections */
  renderPowerUserMap(document.getElementById('powerUserSection'), data);
  renderAccountHealth(document.getElementById('healthSection'), data);
  renderRiskActions(document.getElementById('riskActionsSection'), narrative);
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
