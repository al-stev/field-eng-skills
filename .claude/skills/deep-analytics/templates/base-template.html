<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
/* ── DESIGN TOKENS (dark mode default) ── */
:root {
  --bg-primary: #0c0f14;
  --bg-elevated: #141820;
  --bg-surface: #1a1f2b;
  --bg-hover: #222838;
  --border: #2a3040;
  --border-subtle: #1e2430;
  --text-primary: #e8eaed;
  --text-secondary: #8b92a0;
  --text-tertiary: #5c6370;
  --accent: #d4a853;
  --accent-dim: rgba(212, 168, 83, 0.12);
  --accent-border: rgba(212, 168, 83, 0.25);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.10);
  --green-border: rgba(74, 222, 128, 0.22);
  --blue: #60a5fa;
  --blue-dim: rgba(96, 165, 250, 0.10);
  --blue-border: rgba(96, 165, 250, 0.22);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.10);
  --amber-border: rgba(251, 191, 36, 0.22);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.10);
  --red-border: rgba(248, 113, 113, 0.22);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 6px;
  --noise-opacity: 0.025;
  --mode: dark;
}

/* Light mode */
@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f6f4f0;
    --bg-elevated: #ffffff;
    --bg-surface: #eeece8;
    --bg-hover: #e6e4e0;
    --border: #d4d2ce;
    --border-subtle: #e0ded9;
    --text-primary: #1a1a1a;
    --text-secondary: #5c5c5c;
    --text-tertiary: #8c8c8c;
    --accent: #b8922e;
    --accent-dim: rgba(184, 146, 46, 0.10);
    --accent-border: rgba(184, 146, 46, 0.25);
    --green: #1a7a4c;
    --green-dim: rgba(26, 122, 76, 0.08);
    --green-border: rgba(26, 122, 76, 0.20);
    --blue: #1565a0;
    --blue-dim: rgba(96, 165, 250, 0.08);
    --blue-border: rgba(21, 101, 160, 0.20);
    --amber: #9a6e08;
    --amber-dim: rgba(154, 110, 8, 0.08);
    --amber-border: rgba(154, 110, 8, 0.20);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --red-border: rgba(220, 38, 38, 0.20);
    --noise-opacity: 0;
    --mode: light;
  }
}

/* ── RESET ── */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── BASE ── */
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  padding: clamp(16px, 4vw, 48px);
}

/* Noise texture overlay -- dark mode only */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: var(--noise-opacity);
  pointer-events: none;
  z-index: 9999;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

.container { max-width: 1160px; margin: 0 auto; position: relative; }

/* ── Page nav bar -- XCUT-11 ── */
.page-nav {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  align-items: center;
}
.page-nav .nav-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.page-nav .nav-link {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-tertiary);
  text-decoration: none;
}
.page-nav .nav-link:hover { color: var(--text-secondary); }
.page-nav .nav-link.active { color: var(--accent); }

/* ── Header ── */
.page-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-primary);
}
.gold-rule {
  width: 120px;
  height: 2px;
  background: var(--accent);
  margin: 8px 0 12px 0;
}
.header-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 4px;
}
.micro-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  line-height: 1.4;
}
.date-range {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

/* ── KPI headline row -- XCUT-02 (inline stats, NOT cards) ── */
.kpi-row {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
.kpi-item { display: flex; flex-direction: column; }
.kpi-value {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-primary);
}
.kpi-label {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text-secondary);
}

/* ── AI Narrative section -- XCUT-01 ── */
.narrative-section {
  margin-bottom: 32px;
}
.narrative-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.narrative-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 24px;
}
.narrative-container p {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  margin-bottom: 16px;
}
.narrative-container p:last-child { margin-bottom: 0; }
.narrative-container h4 {
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text-primary);
  margin: 16px 0 8px 0;
}
.narrative-container ul {
  list-style: none;
  padding: 0;
}
.narrative-container li {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  padding-left: 16px;
  position: relative;
  margin-bottom: 4px;
}
.narrative-container li::before {
  content: '-';
  position: absolute;
  left: 0;
  color: var(--text-tertiary);
}

/* ── Copy button -- XCUT-10 ── */
.copy-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 10px;
  cursor: pointer;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.copy-btn:hover { color: var(--text-secondary); border-color: var(--text-tertiary); }

/* ── Chart container ── */
.chart-section { margin-bottom: 32px; }
.chart-container {
  width: 100%;
  height: 400px;
  background: var(--bg-surface);
  border-radius: var(--radius);
}

/* ── Empty state -- XCUT-07 ── */
.empty-state {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-tertiary);
  padding: 32px;
  text-align: center;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  margin-top: 16px;
}

/* ── Print styles -- XCUT-09 ── */
@media print {
  .page-nav, .copy-btn, [class*="toolbox"] { display: none !important; }
  body { background: white; color: black; }
  body::before { display: none; }
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0s !important; transition-duration: 0s !important; }
}
</style>
</head>
<body>
<div class="container">

  <!-- Page Navigation -- XCUT-11 -->
  <nav class="page-nav" id="pageNav">
    <span class="nav-label">ANALYTICS</span>
    <!-- Links populated by JS from PAGE_DATA.page_type -->
  </nav>

  <!-- Header -->
  <h1 class="page-title" id="pageTitle"></h1>
  <div class="gold-rule"></div>
  <div class="header-meta">
    <span class="micro-label">W&B DEEP ANALYTICS</span>
    <span class="micro-label" style="color:var(--text-tertiary)">&#183;</span>
    <span class="micro-label" id="generatedDate"></span>
  </div>
  <div class="date-range" id="dateRange"></div>

  <!-- KPI Headline Row -- XCUT-02 -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- AI Narrative -- XCUT-01 -->
  <div class="narrative-section">
    <div class="narrative-header">
      <span class="micro-label">AI ANALYSIS</span>
      <button class="copy-btn" id="copyNarrativeBtn" onclick="copyNarrative()">COPY TO CLIPBOARD</button>
    </div>
    <div class="narrative-container" id="narrativeContent"></div>
  </div>

  <!-- Chart Section -->
  <div class="chart-section" id="chartSection">
    <div class="chart-container" id="sampleChart"></div>
    <div id="sparklineGrid" style="display:none;"></div>
  </div>

  <!-- Empty State Section (shown when PAGE_DATA.available === false) -->
  <div id="emptyStateSection"></div>

</div>

<script>
/* ════════════════════════════════════════════════════════
   DATA CONSTANTS (sentinel-delimited for machine injection)
   ════════════════════════════════════════════════════════ */

/* PAGE_DATA_START */
const PAGE_DATA = {
    customer: "Sample Corp",
    generated: "2026-03-24",
    period: { start: "2025-03-24", end: "2026-03-24" },
    available: true,
    reason: null,
    page_type: "user-journey",
    kpis: [
        { value: "--", label: "Total Users" },
        { value: "--", label: "Active (30d)" },
        { value: "--", label: "Top Product Area" },
        { value: "--", label: "Data Period" }
    ]
};
/* PAGE_DATA_END */

/* AI_NARRATIVE_START */
const AI_NARRATIVE = {
    executive_summary: "This section will contain AI-generated analysis of the data patterns, with actionable recommendations for the SE conversation.",
    highlights: ["Highlight 1 placeholder", "Highlight 2 placeholder"],
    recommendations: ["Recommendation 1 placeholder", "Recommendation 2 placeholder"]
};
/* AI_NARRATIVE_END */

/* ════════════════════════════════════════════════════════
   THEME FUNCTIONS
   ════════════════════════════════════════════════════════ */

function isDarkMode() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function getThemeColors() {
  const dark = isDarkMode();
  return {
    bg: 'transparent',
    textPrimary: dark ? '#e8eaed' : '#1a1a1a',
    textSecondary: dark ? '#8b92a0' : '#5c5c5c',
    textTertiary: dark ? '#5c6370' : '#8c8c8c',
    accent: dark ? '#d4a853' : '#b8922e',
    blue: dark ? '#60a5fa' : '#1565a0',
    green: dark ? '#4ade80' : '#1a7a4c',
    amber: dark ? '#fbbf24' : '#9a6e08',
    red: dark ? '#f87171' : '#dc2626',
    borderSubtle: dark ? '#1e2430' : '#e0ded9',
    bgElevated: dark ? '#141820' : '#ffffff',
    bgSurface: dark ? '#1a1f2b' : '#eeece8'
  };
}

function registerWandbTheme() {
  const c = getThemeColors();
  echarts.registerTheme('wandb', {
    backgroundColor: c.bg,
    textStyle: {
      fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
      fontSize: 11,
      color: c.textSecondary
    },
    title: {
      textStyle: { color: c.textPrimary, fontFamily: "'Outfit', system-ui, sans-serif" }
    },
    legend: {
      textStyle: { color: c.textSecondary, fontFamily: "'Outfit', system-ui, sans-serif", fontSize: 12 }
    },
    tooltip: {
      backgroundColor: c.bgElevated,
      borderColor: c.borderSubtle,
      borderWidth: 1,
      textStyle: {
        color: c.textPrimary,
        fontFamily: "'Outfit', system-ui, sans-serif",
        fontSize: 13
      },
      extraCssText: 'border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);'
    },
    categoryAxis: {
      axisLine: { lineStyle: { color: c.borderSubtle } },
      axisTick: { show: false },
      axisLabel: {
        color: c.textTertiary,
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 11
      },
      splitLine: { lineStyle: { color: c.borderSubtle, type: 'dashed' } }
    },
    valueAxis: {
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        color: c.textTertiary,
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 11
      },
      splitLine: { lineStyle: { color: c.borderSubtle, type: 'dashed' } }
    },
    color: [c.blue, c.accent, c.green, c.amber, c.red],
    animationDuration: 600,
    animationEasing: 'cubicOut'
  });
}

/* ════════════════════════════════════════════════════════
   EMPTY STATE -- XCUT-07
   ════════════════════════════════════════════════════════ */

function renderEmptyState(section, reason) {
  const messages = {
    config_error: 'Customer not configured for BigQuery access. Add sfdc_account_id to templates/customers.yaml.',
    no_data: 'No data available for this section. The customer may not have activity in this dimension.',
    api_error: 'BigQuery data unavailable -- check ADC credentials with /bigquery-setup.',
    schema_error: 'Required data tables are not accessible. Contact the analytics team.',
    team_data_unavailable: 'Team data unavailable. This account does not have organization structure configured in W&B. Team-level analysis requires org_name to be populated.',
    team_names_unavailable: 'Teams detected but names unavailable. Users are flagged as team members, but organization names are not populated.',
  };
  const msg = messages[reason] || 'No data available.';
  return '<div class="empty-state">' + msg + '</div>';
}

/* ════════════════════════════════════════════════════════
   COPY TO CLIPBOARD -- XCUT-10
   ════════════════════════════════════════════════════════ */

function copyNarrative() {
  const text = AI_NARRATIVE.executive_summary +
    '\n\nKey Highlights:\n' +
    AI_NARRATIVE.highlights.map(function(h) { return '- ' + h; }).join('\n') +
    '\n\nRecommendations:\n' +
    AI_NARRATIVE.recommendations.map(function(r) { return '- ' + r; }).join('\n');

  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copyNarrativeBtn');
    var original = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(function() {
      btn.textContent = original;
      btn.style.color = '';
    }, 2000);
  });
}

/* ════════════════════════════════════════════════════════
   NAVIGATION BUILDER -- XCUT-11
   ════════════════════════════════════════════════════════ */

var PAGE_TYPES = [
  { slug: 'user-journey', label: 'User Journey' },
  { slug: 'cohort-analysis', label: 'Cohort Analysis' },
  { slug: 'engagement-decay', label: 'Engagement Decay' },
  { slug: 'feature-velocity', label: 'Feature Velocity' },
  { slug: 'team-detection', label: 'Team Detection' },
  { slug: 'risk-scoring', label: 'Risk Scoring' },
  { slug: 'usage-correlation', label: 'Usage Correlation' },
  { slug: 'sdk-versions', label: 'SDK Versions' },
  { slug: 'performance', label: 'Performance' }
];

function buildNav() {
  var nav = document.getElementById('pageNav');
  var today = PAGE_DATA.generated || new Date().toISOString().slice(0, 10);
  PAGE_TYPES.forEach(function(p) {
    var a = document.createElement('a');
    a.className = 'nav-link' + (p.slug === PAGE_DATA.page_type ? ' active' : '');
    a.href = './' + today + '-' + p.slug + '.html';
    a.textContent = p.label;
    if (p.slug === PAGE_DATA.page_type) a.href = '#';
    nav.appendChild(a);
  });
}

/* ════════════════════════════════════════════════════════
   RENDER FUNCTIONS
   ════════════════════════════════════════════════════════ */

function renderHeader() {
  document.getElementById('pageTitle').textContent = PAGE_DATA.customer;
  document.getElementById('generatedDate').textContent = 'Generated ' + PAGE_DATA.generated;
  var dr = document.getElementById('dateRange');
  if (PAGE_DATA.period && PAGE_DATA.period.start && PAGE_DATA.period.end) {
    dr.textContent = PAGE_DATA.period.start + ' \u2014 ' + PAGE_DATA.period.end;
  } else {
    dr.textContent = '';
  }
}

function renderKPIs() {
  var row = document.getElementById('kpiRow');
  (PAGE_DATA.kpis || []).forEach(function(kpi) {
    var item = document.createElement('div');
    item.className = 'kpi-item';
    item.innerHTML = '<span class="kpi-value">' + kpi.value + '</span>' +
                     '<span class="kpi-label">' + kpi.label + '</span>';
    row.appendChild(item);
  });
}

function renderNarrative() {
  var container = document.getElementById('narrativeContent');
  var html = '<p>' + AI_NARRATIVE.executive_summary + '</p>';
  if (AI_NARRATIVE.highlights && AI_NARRATIVE.highlights.length) {
    html += '<h4>Key Highlights</h4><ul>' +
            AI_NARRATIVE.highlights.map(function(h) { return '<li>' + h + '</li>'; }).join('') + '</ul>';
  }
  if (AI_NARRATIVE.recommendations && AI_NARRATIVE.recommendations.length) {
    html += '<h4>Recommendations</h4><ul>' +
            AI_NARRATIVE.recommendations.map(function(r) { return '<li>' + r + '</li>'; }).join('') + '</ul>';
  }
  container.innerHTML = html;
}

/* ════════════════════════════════════════════════════════
   CHART RENDERING -- dispatches by PAGE_DATA.page_type
   ════════════════════════════════════════════════════════ */

function renderCharts() {
  if (!PAGE_DATA.available) {
    // Some pages (e.g., performance) handle their own descoped/unavailable state
    var renderer = PAGE_RENDERERS[PAGE_DATA.page_type];
    if (renderer && PAGE_DATA.reason && PAGE_DATA.reason !== 'not_implemented') {
      document.getElementById('sampleChart').style.display = 'none';
      renderer();
      return;
    }
    document.getElementById('chartSection').style.display = 'none';
    document.getElementById('emptyStateSection').innerHTML =
      renderEmptyState('chart', PAGE_DATA.reason);
    return;
  }

  var renderer = PAGE_RENDERERS[PAGE_DATA.page_type];
  if (renderer) {
    document.getElementById('sampleChart').style.display = 'none';
    renderer();
  } else {
    renderFallbackChart();
  }
}

function renderFallbackChart() {
  var container = document.getElementById('sampleChart');
  var chart = echarts.init(container, 'wandb');
  var c = getThemeColors();
  chart.setOption({
    title: { text: 'Page Type: ' + PAGE_DATA.page_type, subtext: 'Chart renderer not yet implemented' },
    tooltip: { trigger: 'axis' },
    toolbox: { feature: { saveAsImage: { title: 'Save as PNG', pixelRatio: 2, backgroundColor: c.bgElevated } }, right: 16, top: 8, iconStyle: { borderColor: c.textTertiary } },
    xAxis: { type: 'category', data: ['No', 'Chart', 'Yet'] },
    yAxis: { type: 'value' },
    series: [{ name: 'Placeholder', type: 'bar', data: [0, 0, 0] }]
  });
  window.addEventListener('resize', function() { chart.resize(); });
}

/* ── Feature Velocity sparkline grid ── */

function renderFeatureVelocity() {
  var grid = document.getElementById('sparklineGrid');
  grid.style.display = 'block';
  var areas = PAGE_DATA.areas || [];
  var c = getThemeColors();
  var charts = [];

  // Legend — once at the top
  var legendDiv = document.createElement('div');
  legendDiv.style.cssText = 'display:flex; gap:24px; padding:0 0 16px 184px; font-family:JetBrains Mono,monospace; font-size:11px; color:' + c.textTertiary + ';';
  legendDiv.innerHTML = '<span><span style="display:inline-block;width:12px;height:12px;background:' + c.accent + ';border-radius:2px;vertical-align:middle;margin-right:4px;"></span> Events</span>' +
    '<span><span style="display:inline-block;width:12px;height:2px;background:' + c.green + ';vertical-align:middle;margin-right:4px;"></span> Monthly Active Users</span>';
  grid.appendChild(legendDiv);

  areas.forEach(function(area, idx) {
    // Container for each area
    var row = document.createElement('div');
    row.style.cssText = 'display:flex; align-items:center; gap:24px; padding:16px 0; border-bottom:1px solid ' + c.border + ';';

    // Label + momentum
    var label = document.createElement('div');
    label.style.cssText = 'min-width:160px; flex-shrink:0;';
    var arrow = area.momentum === 'up' ? '↑' : area.momentum === 'down' ? '↓' : '→';
    var arrowColor = area.momentum === 'up' ? c.green : area.momentum === 'down' ? c.red : c.textTertiary;
    label.innerHTML = '<div style="font-family:Outfit,sans-serif; font-size:14px; font-weight:600; color:' + c.textPrimary + ';">' + area.area + '</div>' +
      '<div style="font-family:JetBrains Mono,monospace; font-size:11px; color:' + arrowColor + ';">' +
      arrow + ' ' + (area.momentum_pct > 0 ? '+' : '') + area.momentum_pct + '% <span style="color:' + c.textTertiary + '">vs prior 3mo</span></div>' +
      '<div style="font-family:JetBrains Mono,monospace; font-size:11px; color:' + c.textTertiary + ';">' +
      area.total_events.toLocaleString() + ' events · ' + area.avg_recent_users + ' active users/mo</div>';

    // Chart container
    var chartDiv = document.createElement('div');
    chartDiv.style.cssText = 'flex:1; height:80px; min-width:300px;';
    chartDiv.id = 'spark-' + idx;

    row.appendChild(label);
    row.appendChild(chartDiv);
    grid.appendChild(row);

    // Render sparkline after DOM insertion
    setTimeout(function() {
      var spark = echarts.init(chartDiv, 'wandb');
      spark.setOption({

      allB.style.background = !licensedOnly ? c.accent + '22' : 'transparent';
      allB.style.color = !licensedOnly ? c.accent : c.textSecondary;
      allB.style.borderColor = !licensedOnly ? c.accent + '44' : c.borderSubtle;
    }
  }

  // "Licensed" button (default active)
  if (PAGE_DATA.contracted_seats) {
    var licBtn = document.createElement('button');
    licBtn.style.cssText = 'display:flex; align-items:center; gap:6px; padding:4px 12px; border-radius:14px; border:1px solid ' + c.accent + '44; background:' + c.accent + '22; color:' + c.accent + '; cursor:pointer; font-family:JetBrains Mono,monospace; font-size:11px;';
    licBtn.textContent = 'LICENSED (' + PAGE_DATA.contracted_seats + ')';
    licBtn.id = 'filter-licensed';
    licBtn.onclick = function() {
      licensedOnly = true;
      activeFilters = { hot: true, warm: true, cooling: true, cold: true };
      updateScopeButtons();
      applyFilters();
    };
    summaryDiv.appendChild(licBtn);
  }

  // "All" button
  var allBtn = document.createElement('button');
  allBtn.style.cssText = 'display:flex; align-items:center; gap:6px; padding:4px 12px; border-radius:14px; border:1px solid ' + c.borderSubtle + '; background:transparent; color:' + c.textSecondary + '; cursor:pointer; font-family:JetBrains Mono,monospace; font-size:11px;';
  allBtn.textContent = 'ALL (' + users.length + ')';
  allBtn.id = 'filter-all';
  allBtn.onclick = function() {
    licensedOnly = false;
    activeFilters = { hot: true, warm: true, cooling: true, cold: true };
    updateScopeButtons();
    applyFilters();
  };
  summaryDiv.appendChild(allBtn);

  // Separator
  var sepSpan = document.createElement('span');
  sepSpan.style.cssText = 'width:1px; height:20px; background:' + c.borderSubtle + '; margin:0 4px;';
  summaryDiv.appendChild(sepSpan);

  ['hot', 'warm', 'cooling', 'cold'].forEach(function(s) {
    var count = counts[s] || 0;
    if (count === 0) return;
    var sc = statusColors[s];
    var btn = document.createElement('button');
    btn.style.cssText = 'display:flex; align-items:center; gap:6px; padding:4px 12px; border-radius:14px; border:1px solid ' + sc + '44; background:' + sc + '22; color:' + sc + '; cursor:pointer; font-family:JetBrains Mono,monospace; font-size:11px;';
    btn.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + sc + ';"></span> ' + count + ' ' + s;
    btn.dataset.status = s;
    btn.onclick = function() {
      var allOn = Object.values(activeFilters).every(function(v) { return v; });
      if (allOn) {
        activeFilters = { hot: false, warm: false, cooling: false, cold: false };
        activeFilters[s] = true;
      } else if (activeFilters[s] && Object.values(activeFilters).filter(function(v){return v;}).length === 1) {
        activeFilters = { hot: true, warm: true, cooling: true, cold: true };
      } else {
        activeFilters[s] = !activeFilters[s];
      }
      applyFilters();
    };
    summaryDiv.appendChild(btn);
  });

  grid.appendChild(summaryDiv);

  function applyFilters() {
    var rows = grid.querySelectorAll('[data-user-status]');
    var visibleCounts = { hot: 0, warm: 0, cooling: 0, cold: 0 };
    rows.forEach(function(row) {
      var status = row.dataset.userStatus;
      var isLicensed = row.dataset.licensed === 'true';
      var statusVisible = activeFilters[status];
      var licenseVisible = !licensedOnly || isLicensed;
      var visible = statusVisible && licenseVisible;
      row.style.display = visible ? 'flex' : 'none';
      if (licenseVisible) visibleCounts[status] = (visibleCounts[status] || 0) + 1;
    });
    // Update status button counts
    grid.querySelectorAll('button[data-status]').forEach(function(btn) {
      var s = btn.dataset.status;
      var sc = statusColors[s];
      var count = visibleCounts[s] || 0;
      btn.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + sc + ';"></span> ' + count + ' ' + s;
      btn.style.opacity = activeFilters[s] ? '1' : '0.4';
    });
  }

  // Note: initial applyFilters() called after rows are built (see below)

  // Table header
  var headerDiv = document.createElement('div');
  headerDiv.style.cssText = 'display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:2px solid ' + c.borderSubtle + '; font-family:JetBrains Mono,monospace; font-size:10px; color:' + c.textTertiary + '; text-transform:uppercase; letter-spacing:1px;';
  headerDiv.innerHTML =
    '<div style="width:60px;">STATUS</div>' +
    '<div style="width:140px;">USER</div>' +
    '<div style="flex:1; min-width:200px;">ACTIVITY (52 WEEKS)</div>' +
    '<div style="width:80px; text-align:right;">PEAK/WK</div>' +
    '<div style="width:80px; text-align:right;">NOW/WK</div>' +
    '<div style="width:70px; text-align:right;">TREND</div>' +
    '<div style="width:90px; text-align:right;">LAST ACTIVE</div>';
  grid.appendChild(headerDiv);

  users.forEach(function(user, idx) {
    var sc = statusColors[user.status] || c.textTertiary;
    var row = document.createElement('div');
    row.style.cssText = 'display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid ' + c.borderSubtle + ';';
    row.dataset.userStatus = user.status;
    row.dataset.licensed = user.licensed ? 'true' : 'false';

    // Status badge
    var badge = '<div style="width:60px;"><span style="display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-family:JetBrains Mono,monospace; background:' + sc + '22; color:' + sc + '; border:1px solid ' + sc + '44;">' + user.status + '</span></div>';

    // Username
    var nameDiv = '<div style="width:140px; font-family:Outfit,sans-serif; font-size:13px; font-weight:500; color:' + c.textPrimary + '; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="' + (user.email || user.username) + '">' + user.username + '</div>';

    // Sparkline container
    var sparkId = 'decay-spark-' + idx;
    var sparkDiv = '<div id="' + sparkId + '" style="flex:1; height:36px; min-width:200px;"></div>';

    // Peak
    var peak = '<div style="width:80px; text-align:right; font-family:JetBrains Mono,monospace; font-size:12px; color:' + c.textSecondary + ';">' + Math.round(user.peak_weekly_avg).toLocaleString() + '</div>';

    // Recent
    var recent = '<div style="width:80px; text-align:right; font-family:JetBrains Mono,monospace; font-size:12px; color:' + (user.recent_weekly_avg > 0 ? c.textPrimary : c.textTertiary) + ';">' + Math.round(user.recent_weekly_avg).toLocaleString() + '</div>';

    // Trend
    var trendColor = user.trend_pct > 10 ? c.green : user.trend_pct < -10 ? c.red : c.textTertiary;
    var trendArrow = user.trend_pct > 10 ? '\u2191' : user.trend_pct < -10 ? '\u2193' : '\u2192';
    var trend = '<div style="width:70px; text-align:right; font-family:JetBrains Mono,monospace; font-size:11px; color:' + trendColor + ';">' + trendArrow + ' ' + (user.trend_pct > 0 ? '+' : '') + user.trend_pct + '%</div>';

    // Last active
    var lastActive = user.last_active ? user.last_active.slice(5) : '--';
    var lastColor = user.weeks_inactive > 8 ? c.red : user.weeks_inactive > 4 ? c.amber : c.textSecondary;
    var lastDiv = '<div style="width:90px; text-align:right; font-family:JetBrains Mono,monospace; font-size:11px; color:' + lastColor + ';">' + lastActive + '</div>';

    row.innerHTML = badge + nameDiv + sparkDiv + peak + recent + trend + lastDiv;
    grid.appendChild(row);

    // Render sparkline after DOM insertion
    setTimeout(function() {
      var container = document.getElementById(sparkId);
      if (!container) return;
      var spark = echarts.init(container, 'wandb');
      var sparkData = user.sparkline || [];

      // Color bars by status zones
      var barData = sparkData.map(function(val, i) {
        var isRecent = i >= sparkData.length - 4;
        var barColor = isRecent ? sc : (val > 0 ? c.textTertiary + '66' : 'transparent');
        return { value: val, itemStyle: { color: barColor } };
      });

      spark.setOption({
        tooltip: {
          trigger: 'axis',
          formatter: function(p) {
            var weekIdx = p[0].dataIndex;
            var weeks = PAGE_DATA.weeks || [];
            return (weeks[weekIdx] || 'Week ' + weekIdx) + '<br/>Events: ' + p[0].value.toLocaleString();
          }
        },
        grid: { left: 0, right: 0, top: 2, bottom: 2 },
        xAxis: { type: 'category', show: false, data: sparkData.map(function(_, i) { return i; }) },
        yAxis: { type: 'value', show: false },
        series: [{
          type: 'bar',
          data: barData,
          barMaxWidth: 4,
          barMinWidth: 1,
          barGap: '20%',
          silent: false
        }]
      });
      charts.push(spark);
    }, 5 * idx);
  });

  // Apply initial filter after rows are in the DOM
  applyFilters();

  window.addEventListener('resize', function() { charts.forEach(function(ch) { ch.resize(); }); });
}

}

      var end = new Date(t.last_active).getTime();
      if (!minDate || start < minDate) minDate = start;
      if (!maxDate || end > maxDate) maxDate = end;
    });

    var renderData = tl.map(function(t, i) {
      return {
        value: [new Date(t.first_active).getTime(), tl.length - 1 - i, new Date(t.last_active).getTime()],
        name: t.name
      };
    });

    timelineChart.setOption({
      tooltip: {
        formatter: function(p) {
          var d = p.data || {};
          var start = new Date(d.value[0]).toISOString().slice(0, 10);
          var end = new Date(d.value[2]).toISOString().slice(0, 10);
          return '<strong>' + d.name + '</strong><br/>First active: ' + start + '<br/>Last active: ' + end;
        }
      },
      toolbox: { feature: { saveAsImage: { title: 'Save as PNG', pixelRatio: 2, backgroundColor: c.bgElevated } }, right: 8, top: 0, iconStyle: { borderColor: c.textTertiary }, itemSize: 12 },
      grid: { left: 120, right: 24, top: 16, bottom: 24 },
      xAxis: {
        type: 'time',
        min: minDate,
        max: maxDate,

        renderItem: function(params, api) {
          var start = api.coord([api.value(0), api.value(1)]);
          var end = api.coord([api.value(2), api.value(1)]);
          var height = api.size([0, 1])[1] * 0.5;
          return {
            type: 'rect',
            shape: {
              x: start[0],
              y: start[1] - height / 2,
              width: Math.max(end[0] - start[0], 4),
              height: height
            },
            style: api.style({ fill: c.blue }),
            styleEmphasis: api.styleEmphasis()
          };
        },
        encode: { x: [0, 2], y: 1 },
        data: renderData,
        itemStyle: { color: c.blue, borderRadius: 3 }

/* ── Staleness Banner helper (used by Risk Scoring) ── */

function renderStalenessBanner(type, data) {
  var c = getThemeColors();
  var configs = {
    stale_model: {
      bg: 'rgba(251,191,36,0.10)',
      border: 'rgba(251,191,36,0.22)',
      color: c.amber,
      text: 'Churn model data is ' + data.age_days + ' days old. Interpret ML-based risk factors with caution.'
    },
    no_model: {
      bg: 'rgba(96,165,250,0.10)',
      border: 'rgba(96,165,250,0.22)',
      color: c.blue,
      text: 'Risk score excludes ML churn model (data unavailable). Score is based on behavioral signals only: engagement trend, seat utilization, and support velocity.'
    },
    veto: {
      bg: 'rgba(248,113,113,0.10)',
      border: 'rgba(248,113,113,0.22)',
      color: c.red,
      text: 'Critical threshold exceeded: ' + (data.factor_name || 'Churn probability') + ' triggered automatic high-risk floor.'
    }
  };
  var cfg = configs[type];
  if (!cfg) return '';
  return '<div style="background:' + cfg.bg + '; border:1px solid ' + cfg.border +
         '; border-radius:6px; padding:8px 16px; margin-bottom:16px; font-family:Outfit,sans-serif; font-size:14px; font-weight:600; color:' + cfg.color + ';">' +

  var errorLabel = document.createElement('div');
  errorLabel.style.cssText = microLabelCss + '; margin-top:16px;';
  errorLabel.textContent = 'ERROR METRICS';
  grid.appendChild(errorLabel);

  var errorRow = document.createElement('div');
  errorRow.style.cssText = 'display:flex; gap:24px; margin-bottom:32px; flex-wrap:wrap;';

  var errorTrend = errors.error_trend || 0;
  var trendArrow = errorTrend < 0 ? '\u2193' : (errorTrend > 0 ? '\u2191' : '\u2192');
  var trendColor = errorTrend < 0 ? c.green : (errorTrend > 0 ? c.red : c.textSecondary);

  var statItems = [
    { label: 'Users Facing Errors', value: (errors.users_facing_errors || 0).toString() },
    { label: 'Error Count', value: (errors.error_count || 0).toString() },
    { label: 'Error Trend 30d', value: errorTrend + '%', color: trendColor, arrow: trendArrow }
  ];

  statItems.forEach(function(item) {
    var card = document.createElement('div');
    card.style.cssText = 'background:' + c.bgSurface + '; border-radius:8px; padding:16px 24px; min-width:160px;';
    var val = document.createElement('div');
    var displayColor = item.color || c.textPrimary;
    val.style.cssText = 'font-family:"Instrument Serif",Georgia,serif; font-size:28px; color:' + displayColor + ';';
    val.textContent = (item.arrow ? item.arrow + ' ' : '') + item.value;
    var lbl = document.createElement('div');
    lbl.style.cssText = 'font-family:Outfit,sans-serif; font-size:12px; color:' + c.textTertiary + '; margin-top:4px;';
    lbl.textContent = item.label;
    card.appendChild(val);
    card.appendChild(lbl);
    errorRow.appendChild(card);
  });
  grid.appendChild(errorRow);

  // ── Section 3: Chart Load Latency Distribution ──
  var latLabel = document.createElement('div');
  latLabel.style.cssText = microLabelCss;
  latLabel.textContent = 'CHART LOAD LATENCY DISTRIBUTION';
  grid.appendChild(latLabel);

  var latBins = latency.bins || [];
  var hasLatency = latBins.some(function(b) { return b.count > 0; });

  if (!hasLatency) {
    var latEmpty = document.createElement('div');
    latEmpty.className = 'empty-state';
    latEmpty.textContent = 'No latency data available for this account.';
    grid.appendChild(latEmpty);
  } else {
    var latDiv = document.createElement('div');
    latDiv.style.cssText = 'width:100%; height:360px; margin-bottom:32px;';
    grid.appendChild(latDiv);

    setTimeout(function() {
      var latChart = echarts.init(latDiv, 'wandb');
      var binLabels = latBins.map(function(b) { return b.label; });
      var binCounts = latBins.map(function(b) { return b.count; });

      // Determine which bin contains P95 for markLine
      var p95Val = latency.p95;
      var p95BinIdx = 0;
      if (typeof p95Val === 'number') {
        for (var i = 0; i < latBins.length; i++) {
          var edges = [[0,1000],[1000,2000],[2000,5000],[5000,10000],[10000,Infinity]];
          if (p95Val >= edges[i][0] && p95Val < edges[i][1]) { p95BinIdx = i; break; }
          if (i === latBins.length - 1) p95BinIdx = i;
        }
      }

      var markLineData = [];
      if (typeof p95Val === 'number') {
        markLineData.push({
          name: 'P95: ' + Math.round(p95Val) + 'ms',
          xAxis: p95BinIdx,
          lineStyle: { type: 'dashed', color: c.red, width: 2 },
          label: { show: true, formatter: 'P95: ' + Math.round(p95Val) + 'ms', color: c.red, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }
        });
      }

      latChart.setOption({
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          formatter: function(params) {
            var d = params[0];
            var bin = latBins[d.dataIndex];
            return bin.label + ': ' + bin.count + ' chart loads (' + bin.pct + '% of total)';
          }
        },
        grid: { left: '8%', right: '5%', top: 40, bottom: 40 },
        xAxis: { type: 'category', data: binLabels },
        yAxis: { type: 'value', name: 'Chart Loads' },
        series: [{
          type: 'bar',
          data: binCounts,
          itemStyle: { color: c.blue, borderRadius: [3, 3, 0, 0] },
          barMaxWidth: 60,
          markLine: {
            silent: true,
            symbol: 'none',
            data: markLineData
          }
        }],
        toolbox: { feature: { saveAsImage: { title: 'Save', pixelRatio: 2, backgroundColor: c.bgElevated } }, right: 16, top: 8, iconStyle: { borderColor: c.textTertiary } }
      });
      charts.push(latChart);
    }, 30);
  }

  // ── Section 4: Slow Chart Load Users (scrollable table) ──
  var usersLabel = document.createElement('div');
  usersLabel.style.cssText = microLabelCss + '; margin-top:16px;';
  usersLabel.textContent = 'SLOW CHART LOAD USERS';
  grid.appendChild(usersLabel);

  if (!slowUsers.length) {
    var usersEmpty = document.createElement('div');
    usersEmpty.className = 'empty-state';
    usersEmpty.textContent = 'No slow chart load user data available for this account.';
    grid.appendChild(usersEmpty);
  } else {
    var tableWrap = document.createElement('div');
    tableWrap.style.cssText = 'max-height:400px; overflow-y:auto; margin-bottom:32px; border:1px solid ' + c.borderSubtle + '; border-radius:8px;';

    var tableHtml = '<table style="width:100%; border-collapse:collapse;">';
    tableHtml += '<thead><tr>';
    var headers = ['USER', 'SLOW LOADS', 'TOTAL LOADS', 'SLOW %', 'LAST SEEN'];
    var aligns = ['left', 'right', 'right', 'right', 'right'];
    headers.forEach(function(h, i) {
      tableHtml += '<th style="text-align:' + aligns[i] + '; padding:8px 16px; color:' + c.textTertiary + '; font-family:JetBrains Mono,monospace; font-size:11px; font-weight:400; text-transform:uppercase; position:sticky; top:0; background:' + c.bgSurface + ';">' + h + '</th>';
    });
    tableHtml += '</tr></thead><tbody>';

    slowUsers.forEach(function(u) {
      var pctColor = c.textSecondary;
      if (u.slow_pct >= 50) pctColor = c.red;
      else if (u.slow_pct >= 20) pctColor = c.amber;

      tableHtml += '<tr style="border-bottom:1px solid ' + c.borderSubtle + ';">';
      tableHtml += '<td style="padding:8px 16px; font-family:Outfit,sans-serif; font-size:14px; color:' + c.textPrimary + ';">' + (u.username || 'unknown') + '</td>';
      tableHtml += '<td style="padding:8px 16px; font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + '; text-align:right;">' + u.slow_loads + '</td>';
      tableHtml += '<td style="padding:8px 16px; font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + '; text-align:right;">' + u.total_loads + '</td>';
      tableHtml += '<td style="padding:8px 16px; font-family:Outfit,sans-serif; font-size:14px; color:' + pctColor + '; text-align:right; font-weight:600;">' + u.slow_pct + '%</td>';
      tableHtml += '<td style="padding:8px 16px; font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + '; text-align:right;">' + u.last_seen + '</td>';
      tableHtml += '</tr>';
    });
    tableHtml += '</tbody></table>';

    tableWrap.innerHTML = tableHtml;
    grid.appendChild(tableWrap);
  }

  // Unified resize handler for all charts
  window.addEventListener('resize', function() { charts.forEach(function(ch) { ch.resize(); }); });
}

/* ── Usage Correlation: heatmap + scatter + privacy badge ── */

function renderUsageCorrelation() {
  var grid = document.getElementById('sparklineGrid');
  grid.style.display = 'block';
  var c = getThemeColors();
  var charts = [];
  var d = PAGE_DATA;

  // ── 1. Privacy Badge (non-dismissible, first element) ──
  var privacyBadge = document.createElement('div');
  privacyBadge.style.cssText = 'background:rgba(248,113,113,0.10); border:1px solid rgba(248,113,113,0.22); border-radius:6px; padding:8px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px;';
  privacyBadge.setAttribute('data-print', 'visible');
  var badgeLabel = document.createElement('span');
  badgeLabel.style.cssText = 'font-family:JetBrains Mono,monospace; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:' + c.red + '; white-space:nowrap;';
  badgeLabel.textContent = 'SE-INTERNAL ONLY';
  var badgeDesc = document.createElement('span');
  badgeDesc.style.cssText = 'font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + ';';
  badgeDesc.textContent = 'Cross-account analysis uses anonymized, pre-aggregated data. Minimum 10-account cohort enforcement. Never share this page with customers.';
  privacyBadge.appendChild(badgeLabel);
  privacyBadge.appendChild(badgeDesc);
  grid.appendChild(privacyBadge);

  // ── 2. PRODUCT COMBINATION MATRIX (Heatmap) ──
  var heatmapLabel = document.createElement('div');
  heatmapLabel.style.cssText = 'font-family:JetBrains Mono,monospace; font-size:11px; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:' + c.textTertiary + '; margin:24px 0 12px 0;';
  heatmapLabel.textContent = 'PRODUCT COMBINATION MATRIX';
  grid.appendChild(heatmapLabel);

  var heatmapDiv = document.createElement('div');
  heatmapDiv.style.cssText = 'width:100%; height:440px;';
  grid.appendChild(heatmapDiv);

  var cm = d.correlation_matrix || { product_areas: [], matrix: [] };
  var areas = cm.product_areas || [];
  var matrixData = cm.matrix || [];

  // Build symmetric heatmap data from upper-triangle entries
  var heatData = [];
  matrixData.forEach(function(entry) {
    var ri = entry[0], ci = entry[1], coOcc = entry[2], retPct = entry[3], cohort = entry[4];
    heatData.push([ri, ci, retPct, coOcc, cohort]);
    heatData.push([ci, ri, retPct, coOcc, cohort]);
  });
  // Diagonal: self (100%)
  areas.forEach(function(a, i) { heatData.push([i, i, 100, 100, 0]); });

  var heatChart = echarts.init(heatmapDiv, 'wandb');
  heatChart.setOption({
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        var val = p.data;
        if (val[0] === val[1]) return areas[val[0]] + ' (self)';
        return areas[val[0]] + ' + ' + areas[val[1]] + ': ' + val[3] + '% of accounts using both have ' + val[2] + '% 6-month retention (n=' + val[4] + ' accounts)';
      }
    },
    grid: { left: 140, right: 80, top: 40, bottom: 80 },
    xAxis: {
      type: 'category', data: areas, position: 'top',
      axisLabel: { rotate: 45, fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: c.textSecondary, interval: 0 },
      splitArea: { show: true, areaStyle: { color: ['transparent', 'rgba(255,255,255,0.02)'] } }
    },
    yAxis: {
      type: 'category', data: areas, inverse: true,
      axisLabel: { fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: c.textSecondary, interval: 0 }
    },
    visualMap: {
      min: 0, max: 100, calculable: true, orient: 'horizontal', left: 'center', bottom: 0,
      inRange: { color: [c.red, c.amber, c.green] },
      textStyle: { color: c.textSecondary, fontSize: 11 },
      text: ['High Retention', 'Low']
    },
    series: [{
      type: 'heatmap', data: heatData,
      label: { show: true, fontSize: 10, fontFamily: "'JetBrains Mono', monospace",
        formatter: function(p) { return p.data[0] === p.data[1] ? '' : p.data[2] + '%'; }
      },
      emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } }
    }],
    toolbox: { feature: { saveAsImage: { title: 'Save', pixelRatio: 2, backgroundColor: c.bgElevated } }, right: 16, top: 8, iconStyle: { borderColor: c.textTertiary } }
  });
  charts.push(heatChart);

  // ── 3. Side-by-side: ACCOUNT POSITIONING + PEER BENCHMARKING ──
  var sideBySide1 = document.createElement('div');
  sideBySide1.style.cssText = 'display:flex; gap:32px; flex-wrap:wrap; margin:24px 0 0 0;';
  grid.appendChild(sideBySide1);

  // Left: Account Positioning
  var posDiv = document.createElement('div');
  posDiv.style.cssText = 'flex:1; min-width:280px;';
  var posLabel = document.createElement('div');
  posLabel.style.cssText = 'font-family:JetBrains Mono,monospace; font-size:11px; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:' + c.textTertiary + '; margin-bottom:12px;';
  posLabel.textContent = 'ACCOUNT POSITIONING';
  posDiv.appendChild(posLabel);

  var ap = d.account_positioning || { active_areas: [], match_patterns: [] };
  var posText = document.createElement('div');
  posText.style.cssText = 'font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + '; line-height:1.6;';
  var posHtml = '<div style="margin-bottom:8px;"><strong style="color:' + c.textPrimary + ';">Active areas:</strong> ' + (ap.active_areas || []).join(', ') + ' (' + (ap.active_areas || []).length + ' of ' + (ap.total_areas || 0) + ')</div>';
  (ap.match_patterns || []).forEach(function(mp) {
    var icon = mp.match ? '<span style="color:' + c.green + ';">&#10003;</span>' : '<span style="color:' + c.amber + ';">&#9679;</span>';
    posHtml += '<div style="margin:4px 0;">' + icon + ' ' + mp.combo + (mp.match ? ' — ' + mp.retention_boost + ' retention' : ' — missing ' + (mp.missing || '') + ' (' + mp.retention_boost + ' potential)') + '</div>';
  });
  posText.innerHTML = posHtml;
  posDiv.appendChild(posText);
  sideBySide1.appendChild(posDiv);

  // Right: Peer Benchmarking (bar chart)
  var peerDiv = document.createElement('div');
  peerDiv.style.cssText = 'flex:1; min-width:300px;';
  var peerLabel = document.createElement('div');
  peerLabel.style.cssText = 'font-family:JetBrains Mono,monospace; font-size:11px; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:' + c.textTertiary + '; margin-bottom:12px;';
  peerLabel.textContent = 'PEER BENCHMARKING';
  peerDiv.appendChild(peerLabel);

  var pb = d.peer_benchmarking || { distribution: { labels: [], counts: [], current_bin: 0 }, account_tier: 'Unknown', breadth_percentile: 0, peer_count: 0 };
  var peerChartDiv = document.createElement('div');
  peerChartDiv.style.cssText = 'width:100%; height:300px;';
  peerDiv.appendChild(peerChartDiv);

  var dist = pb.distribution || { labels: [], counts: [], current_bin: 0 };
  var barColors = dist.labels.map(function(_, i) { return i === dist.current_bin ? c.accent : c.textTertiary; });

  var peerChart = echarts.init(peerChartDiv, 'wandb');
  peerChart.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    grid: { left: 60, right: 20, top: 20, bottom: 60 },
    xAxis: {
      type: 'category', data: dist.labels || [],
      axisLabel: { fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: c.textSecondary }
    },
    yAxis: {
      type: 'value', name: 'Accounts',
      nameTextStyle: { color: c.textTertiary, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" },
      axisLabel: { fontSize: 11, color: c.textTertiary },
      splitLine: { lineStyle: { color: c.borderSubtle } }
    },
    series: [{
      type: 'bar', data: (dist.counts || []).map(function(v, i) {
        return { value: v, itemStyle: { color: barColors[i], opacity: i === dist.current_bin ? 1.0 : 0.4 } };
      }),
      barWidth: '60%'
    }]
  });
  charts.push(peerChart);

  var peerContext = document.createElement('div');
  peerContext.style.cssText = 'font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + '; margin-top:8px; text-align:center;';
  peerContext.innerHTML = 'This account is in the <strong style="color:' + c.accent + ';">P' + Math.round(pb.breadth_percentile) + '</strong> percentile for product breadth among ' + pb.account_tier + '-tier accounts.';
  peerDiv.appendChild(peerContext);
  sideBySide1.appendChild(peerDiv);

  // ── 4. NEXT-BEST-ACTION RECOMMENDATIONS ──
  var nbaLabel = document.createElement('div');
  nbaLabel.style.cssText = 'font-family:JetBrains Mono,monospace; font-size:11px; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:' + c.textTertiary + '; margin:24px 0 12px 0;';
  nbaLabel.textContent = 'NEXT-BEST-ACTION RECOMMENDATIONS';
  grid.appendChild(nbaLabel);

  var nbaContainer = document.createElement('div');
  nbaContainer.style.cssText = 'background:' + c.bgSurface + '; border-radius:6px; padding:16px;';
  var nba = d.next_best_action || [];
  if (nba.length === 0) {
    nbaContainer.innerHTML = '<div style="font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + ';">No expansion recommendations — this account already uses all correlated product areas.</div>';
  } else {
    var nbaHtml = '<ul style="margin:0; padding:0 0 0 8px; list-style:none;">';
    nba.forEach(function(item) {
      nbaHtml += '<li style="margin:8px 0; display:flex; align-items:flex-start; gap:8px;">';
      nbaHtml += '<span style="background:rgba(96,165,250,0.10); border:1px solid rgba(96,165,250,0.22); border-radius:4px; padding:2px 8px; font-family:JetBrains Mono,monospace; font-size:11px; font-weight:600; color:' + c.blue + '; white-space:nowrap;">+' + item.retention_lift_pct + '%</span>';
      nbaHtml += '<span style="font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + ';">' + item.reasoning + '</span>';
      nbaHtml += '</li>';
    });
    nbaHtml += '</ul>';
    nbaContainer.innerHTML = nbaHtml;
  }
  grid.appendChild(nbaContainer);

  // ── 5. Side-by-side: EXPANSION SIGNALS + ARR VS PRODUCT BREADTH ──
  var sideBySide2 = document.createElement('div');
  sideBySide2.style.cssText = 'display:flex; gap:32px; flex-wrap:wrap; margin:24px 0 0 0;';
  grid.appendChild(sideBySide2);

  // Left: Expansion Signals
  var expDiv = document.createElement('div');
  expDiv.style.cssText = 'flex:1; min-width:280px;';
  var expLabel = document.createElement('div');
  expLabel.style.cssText = 'font-family:JetBrains Mono,monospace; font-size:11px; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:' + c.textTertiary + '; margin-bottom:12px;';
  expLabel.textContent = 'EXPANSION SIGNALS';
  expDiv.appendChild(expLabel);

  var signals = d.expansion_signals || [];
  if (signals.length === 0) {
    var noSignals = document.createElement('div');
    noSignals.style.cssText = 'font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + '; padding:16px; background:' + c.bgSurface + '; border-radius:6px;';
    noSignals.textContent = 'No expansion signals detected. Entitlement data may not be available for this account.';
    expDiv.appendChild(noSignals);
  } else {
    signals.forEach(function(sig) {
      var sigEl = document.createElement('div');
      sigEl.style.cssText = 'margin:8px 0; display:flex; align-items:center; gap:8px;';
      sigEl.innerHTML = '<span style="background:rgba(74,222,128,0.10); border:1px solid rgba(74,222,128,0.22); border-radius:4px; padding:2px 8px; font-family:JetBrains Mono,monospace; font-size:11px; font-weight:600; color:' + c.green + '; white-space:nowrap;">' + sig.usage_pct + '%</span>' +
        '<span style="font-family:Outfit,sans-serif; font-size:14px; color:' + c.textSecondary + ';">' + sig.product_area + ' usage approaching contract limit (' + sig.allocation + '). Potential upsell opportunity.</span>';
      expDiv.appendChild(sigEl);
    });
  }
  sideBySide2.appendChild(expDiv);

  // Right: ARR vs Product Breadth (scatter)
  var scatterDiv = document.createElement('div');
  scatterDiv.style.cssText = 'flex:1; min-width:320px;';
  var scatterLabel = document.createElement('div');
  scatterLabel.style.cssText = 'font-family:JetBrains Mono,monospace; font-size:11px; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:' + c.textTertiary + '; margin-bottom:12px;';
  scatterLabel.textContent = 'ARR VS PRODUCT BREADTH';
  scatterDiv.appendChild(scatterLabel);

  var scatterChartDiv = document.createElement('div');
  scatterChartDiv.style.cssText = 'width:100%; height:400px;';
  scatterDiv.appendChild(scatterChartDiv);

  var arrScatter = d.arr_scatter || { current: { breadth: 0, arr: 0 }, peers: [] };
  var peerData = (arrScatter.peers || []).map(function(p) { return [p.breadth, p.arr]; });
  var currentData = [[arrScatter.current.breadth, arrScatter.current.arr]];
  var customerName = d.customer || 'Current Account';

  var scatterChart = echarts.init(scatterChartDiv, 'wandb');
  scatterChart.setOption({
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        if (p.seriesIndex === 0) return 'Peer account: ' + p.data[0] + ' product areas, $' + Math.round(p.data[1] / 1000) + 'K ARR';
        return customerName + ': ' + p.data[0] + ' product areas, $' + Math.round(p.data[1] / 1000) + 'K ARR';
      }
    },
    grid: { left: 80, right: 40, top: 20, bottom: 60 },
    xAxis: {
      type: 'value', name: 'Product Breadth',
      nameLocation: 'center', nameGap: 35,
      nameTextStyle: { color: c.textTertiary, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" },
      axisLabel: { fontSize: 11, color: c.textTertiary },
      splitLine: { lineStyle: { color: c.borderSubtle } }
    },
    yAxis: {
      type: 'value', name: 'ARR ($)',
      nameTextStyle: { color: c.textTertiary, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" },
      axisLabel: { fontSize: 11, color: c.textTertiary, formatter: function(v) { return '$' + Math.round(v / 1000) + 'K'; } },
      splitLine: { lineStyle: { color: c.borderSubtle } }
    },
    series: [
      {
        type: 'scatter', name: 'Peers', data: peerData,
        symbolSize: 6, itemStyle: { color: c.textTertiary, opacity: 0.4 }
      },
      {
        type: 'scatter', name: customerName, data: currentData,
        symbol: 'diamond', symbolSize: 12, itemStyle: { color: c.accent, opacity: 1.0 },
        z: 10
      }
    ],
    toolbox: { feature: { saveAsImage: { title: 'Save', pixelRatio: 2, backgroundColor: c.bgElevated } }, right: 16, top: 8, iconStyle: { borderColor: c.textTertiary } }
  });
  charts.push(scatterChart);

  sideBySide2.appendChild(scatterDiv);

  // ── 6. Unified resize handler ──
  window.addEventListener('resize', function() { charts.forEach(function(ch) { ch.resize(); }); });
}

var PAGE_RENDERERS = {
  'feature-velocity': renderFeatureVelocityV4,
  'sdk-versions': renderSdkVersions,
  'engagement-decay': renderEngagementDecay,
  'user-journey': renderUserJourney,
  'team-detection': renderTeamDetection,
  'cohort-analysis': renderCohortAnalysis,
  'risk-scoring': renderRiskScoring,
  'performance': renderPerformance,
  'usage-correlation': renderUsageCorrelation
};
